<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Design Your Ring — Jewelry by Johan</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  /* ══ JBJ DESIGN SYSTEM v2 — Modern Luxury (Session 26) ══ */
  /* LIGHT THEME (default) */
  --bg:#f6f4ef;--bg2:#fffefb;--bg3:#efece5;--bg4:#e3dfd6;
  --gold:#8a6f24;--gold-light:#b8922e;--gold-dim:#8a6f24;
  --gold-grad:linear-gradient(135deg,#cfae5e 0%,#a8842f 55%,#8a671f 100%);
  --gold-grad-hover:linear-gradient(135deg,#dcbd6f 0%,#b6913a 55%,#987226 100%);
  --gold-wash:rgba(170,134,47,.07);
  --gold-ring:rgba(170,134,47,.28);
  --text:#191813;--text-dim:#45423a;--text-muted:#6b685c;
  --border:#dcd7cc;--border-light:#cbc6ba;
  --danger:#c74b4b;--success:#3d7a50;
  --radius:12px;--radius-lg:18px;
  --font-display:'Cormorant Garamond',Georgia,serif;
  --font-body:'DM Sans',-apple-system,sans-serif;
  --shadow-sm:0 1px 2px rgba(25,22,12,.05),0 3px 10px rgba(25,22,12,.05);
  --shadow:0 2px 6px rgba(25,22,12,.06),0 14px 34px rgba(25,22,12,.09);
  --shadow-lg:0 8px 20px rgba(25,22,12,.10),0 28px 70px rgba(25,22,12,.16);
  --shadow-gold:0 4px 10px rgba(154,124,44,.16),0 10px 28px rgba(154,124,44,.22);
  --transition:0.28s cubic-bezier(.22,1,.36,1);
  --swatch-border:rgba(0,0,0,.14);
  --strip-text:rgba(255,255,255,.92);
  --strip-text-dim:rgba(255,255,255,.68);
  --strip-hover:rgba(0,0,0,.18);
  --overlay:rgba(24,21,14,.45);
  --ring-highlight:rgba(255,255,255,0.35);
  --ring-shadow:rgba(0,0,0,0.18);
  --ring-edge-top:rgba(255,255,255,0.25);
  --ring-edge-bot:rgba(0,0,0,0.25);
  --ring-edge-side:rgba(0,0,0,0.1);
  --ring-strip-stroke:rgba(0,0,0,0.15);
  --done-dot-text:#fff;
  --val-error-bg:rgba(199,75,75,.07);--val-error-border:rgba(199,75,75,.28);--val-error-text:#b03a3a;
  --val-warn-bg:rgba(138,111,36,.07);--val-warn-border:rgba(138,111,36,.28);--val-warn-text:#7b6523;
  --val-info-bg:rgba(61,122,80,.07);--val-info-border:rgba(61,122,80,.28);--val-info-text:#356e47;
  --input-bg:#fffefb;
  --btn-next-text:#fff;
  --glass:rgba(255,254,251,.82);
  --hairline:rgba(154,124,44,.35);
}
[data-theme="dark"]{
  --bg:#121210;--bg2:#1b1b18;--bg3:#242421;--bg4:#2f2f2b;
  --gold:#cfae56;--gold-light:#e0c96a;--gold-dim:#9a8138;
  --gold-grad:linear-gradient(135deg,#ecd489 0%,#cda94e 55%,#a8862f 100%);
  --gold-grad-hover:linear-gradient(135deg,#f5e09c 0%,#d9b65c 55%,#b5923a 100%);
  --gold-wash:rgba(207,174,86,.08);
  --gold-ring:rgba(207,174,86,.32);
  --text:#ece8dd;--text-dim:#a5a194;--text-muted:#908d80;
  --border:#34342f;--border-light:#454540;
  --danger:#d05f5f;--success:#5a9e6f;
  --shadow-sm:0 1px 2px rgba(0,0,0,.35),0 3px 10px rgba(0,0,0,.3);
  --shadow:0 2px 6px rgba(0,0,0,.4),0 14px 34px rgba(0,0,0,.45);
  --shadow-lg:0 8px 20px rgba(0,0,0,.5),0 28px 70px rgba(0,0,0,.55);
  --shadow-gold:0 4px 10px rgba(207,174,86,.10),0 10px 28px rgba(207,174,86,.14);
  --swatch-border:rgba(255,255,255,.12);
  --strip-text:rgba(255,255,255,.85);
  --strip-text-dim:rgba(255,255,255,.6);
  --strip-hover:rgba(255,255,255,.22);
  --overlay:rgba(0,0,0,.72);
  --ring-highlight:rgba(255,255,255,0.15);
  --ring-shadow:rgba(0,0,0,0.35);
  --ring-edge-top:rgba(255,255,255,0.15);
  --ring-edge-bot:rgba(0,0,0,0.4);
  --ring-edge-side:rgba(0,0,0,0.2);
  --ring-strip-stroke:rgba(0,0,0,0.3);
  --done-dot-text:#15130d;
  --val-error-bg:rgba(208,95,95,.09);--val-error-border:rgba(208,95,95,.3);--val-error-text:#e87777;
  --val-warn-bg:rgba(207,174,86,.08);--val-warn-border:rgba(207,174,86,.22);--val-warn-text:#e0c96a;
  --val-info-bg:rgba(90,158,111,.08);--val-info-border:rgba(90,158,111,.22);--val-info-text:#7ec494;
  --input-bg:#242421;
  --btn-next-text:#15130d;
  --glass:rgba(27,27,24,.82);
  --hairline:rgba(207,174,86,.35);
}
html{font-size:16px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{font-family:var(--font-body);color:var(--text);min-height:100vh;overflow-x:hidden;transition:background .3s ease,color .3s ease;
  background:
    radial-gradient(1100px 520px at 50% -8%, rgba(255,255,255,.75), transparent 60%),
    radial-gradient(900px 500px at 100% 110%, var(--gold-wash), transparent 55%),
    var(--bg);
  background-attachment:fixed}
[data-theme="dark"] body{background:
    radial-gradient(1100px 520px at 50% -8%, rgba(255,255,255,.045), transparent 60%),
    radial-gradient(900px 500px at 100% 110%, var(--gold-wash), transparent 55%),
    var(--bg);
  background-attachment:fixed}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit;color:inherit}
::selection{background:rgba(170,134,47,.22)}
:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}
}

/* ── LAYOUT ── */
.app{max-width:1280px;margin:0 auto;padding:0 24px}
.app-header{text-align:center;padding:36px 0 26px;border-bottom:1px solid var(--border);position:relative}
.app-header h1{font-family:var(--font-display);font-weight:500;font-size:2.35rem;letter-spacing:.04em;color:var(--text);line-height:1.1}
.app-header .tagline{font-size:.72rem;color:var(--gold);letter-spacing:.32em;text-transform:uppercase;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:14px;font-weight:500}
.app-header .tagline::before,.app-header .tagline::after{content:'';display:inline-block;width:44px;height:1px;background:linear-gradient(90deg,transparent,var(--hairline));flex-shrink:0}
.app-header .tagline::after{background:linear-gradient(90deg,var(--hairline),transparent)}

/* Steps indicator */
.steps-bar{display:flex;align-items:center;justify-content:center;gap:0;padding:26px 0 20px;overflow-x:auto}
.step-dot{display:flex;align-items:center;gap:0}
.step-dot .dot{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border-light);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:600;color:var(--text-muted);transition:var(--transition);cursor:pointer;flex-shrink:0;background:var(--bg2);box-shadow:var(--shadow-sm)}
.step-dot .dot:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-1px)}
.step-dot .dot.active{border-color:var(--gold);color:var(--gold);background:var(--bg2);box-shadow:0 0 0 4px var(--gold-wash),var(--shadow-gold);transform:scale(1.06)}
.step-dot .dot.done{border-color:transparent;color:var(--done-dot-text);background:var(--gold-grad);box-shadow:var(--shadow-sm)}
.step-dot .line{width:38px;height:2px;border-radius:2px;background:var(--border);flex-shrink:0;transition:background .4s ease}
.step-dot .line.done{background:linear-gradient(90deg,#a8842f,#cfae5e)}
.step-label{display:none;font-size:.62rem;text-transform:uppercase;letter-spacing:.14em;color:var(--text-muted);margin-top:6px;font-weight:600}
.step-dot .dot.active + .step-label{display:block;color:var(--gold)}
.step-dot .tip{display:none;position:absolute;bottom:calc(100% + 12px);left:50%;transform:translateX(-50%);background:var(--glass);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:.72rem;color:var(--text-dim);max-width:230px;white-space:normal;text-align:center;line-height:1.45;box-shadow:var(--shadow);z-index:10;pointer-events:none}
.step-dot .tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--border)}
.step-dot:hover .tip{display:block;animation:fadeIn .25s ease}

/* Main layout: preview + controls */
.main-layout{display:grid;grid-template-columns:1fr 1fr;gap:36px;padding:28px 0 110px}
.preview-col{position:sticky;top:20px;align-self:start}
.controls-col{min-height:400px}
#abovePreview:empty{display:none}
#abovePreview{padding:0 0 110px}

/* Ring Preview */
.ring-preview-wrap{position:relative;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg2) 60%,var(--bg3) 140%);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px 24px;text-align:center;box-shadow:var(--shadow)}
.ring-preview-wrap h3{font-family:var(--font-body);font-weight:600;font-size:.7rem;color:var(--gold);margin-bottom:18px;letter-spacing:.3em;text-transform:uppercase}
.ring-svg-container{display:flex;justify-content:center;align-items:center;min-height:240px}
.ring-svg-container svg,.ring-svg-container canvas{max-width:100%}
.ring-specs{display:flex;justify-content:center;gap:8px;margin-top:18px;font-size:.74rem;color:var(--text-muted);flex-wrap:wrap}
.ring-specs span{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);border-radius:999px;padding:5px 12px}
.ring-specs .val{color:var(--text);font-weight:600}
.ring-reset-wrap{margin-top:14px;text-align:center}
.ring-reset-btn{display:inline-flex;align-items:center;gap:6px;background:var(--bg2);color:var(--text-dim);border:1px solid var(--border);border-radius:999px;padding:7px 16px;font-size:.72rem;font-family:var(--font-body);cursor:pointer;transition:var(--transition);letter-spacing:.02em;box-shadow:var(--shadow-sm)}
.ring-reset-btn:hover{color:var(--gold);border-color:var(--gold);transform:translateY(-1px)}
.canvas-undo-btn{position:absolute;top:12px;left:12px;z-index:10;background:var(--glass);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);color:var(--text-dim);border:1px solid var(--border);border-radius:999px;padding:7px 13px;cursor:pointer;transition:var(--transition);display:none;align-items:center;gap:5px;font-size:.72rem;font-family:var(--font-body);letter-spacing:.02em;box-shadow:var(--shadow-sm)}
.canvas-undo-btn:hover{color:var(--gold);border-color:var(--gold);transform:translateY(-1px)}
.canvas-undo-btn svg{width:14px;height:14px}
.btn-undo{display:inline-flex;align-items:center;gap:5px}
.btn-undo svg{width:14px;height:14px}
.ring-reset-hint{font-size:.62rem;color:var(--text-muted);margin-top:5px}
#iconSun{display:none}
#ringResetWrap{display:none}
#profileDisplay{text-align:center;margin-top:14px;display:none}
.profile-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.18em;color:var(--text-muted);margin-bottom:8px;font-weight:600}
#profileImg{max-width:180px;height:auto;border-radius:var(--radius);border:1px solid var(--border);padding:8px;background:var(--bg3);box-shadow:var(--shadow-sm)}
#profileName{font-size:.76rem;color:var(--text-dim);margin-top:6px;font-weight:600}

/* Price display */
.price-bar{display:none}
.price-bar .label{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted)}
.price-bar .amount{font-family:var(--font-display);font-size:1.7rem;font-weight:500;color:var(--gold)}
.price-bar .note{font-size:.66rem;color:var(--text-muted);margin-top:2px}

/* Strip legend under preview */
.strip-legend{margin-top:14px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.strip-legend-item{display:flex;align-items:center;gap:6px;font-size:.68rem;color:var(--text-dim);background:var(--bg2);border:1px solid var(--border);border-radius:999px;padding:4px 11px;box-shadow:var(--shadow-sm)}
.strip-legend-item .swatch{width:11px;height:11px;border-radius:50%;border:1px solid var(--swatch-border)}

/* ── PANELS ── */
.panel{display:none}
.panel.active{display:block;animation:fadeIn .45s cubic-bezier(.22,1,.36,1)}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes badgePop{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}

.panel-title{font-family:var(--font-display);font-weight:500;font-size:1.8rem;color:var(--text);margin-bottom:6px;letter-spacing:.01em;line-height:1.15}
.panel-desc{font-size:.9rem;color:var(--text-muted);margin-bottom:24px;line-height:1.6;max-width:56ch}

/* Material grid */
.mat-groups{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px}
.mat-group-btn{padding:8px 16px;border-radius:999px;border:1px solid var(--border);font-size:.74rem;font-weight:500;color:var(--text-dim);transition:var(--transition);white-space:nowrap;background:var(--bg2)}
.mat-group-btn:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.mat-group-btn.active{border-color:transparent;color:var(--done-dot-text);background:var(--gold-grad);box-shadow:var(--shadow-sm)}

.mat-search{width:100%;padding:13px 18px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);font-size:.9rem;color:var(--text);margin-bottom:16px;outline:none;transition:var(--transition);box-shadow:var(--shadow-sm)}
.mat-search:focus{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-wash)}
.mat-search::placeholder{color:var(--text-muted)}

.mat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;max-height:400px;overflow-y:auto;padding:2px 6px 8px 2px}
.mat-grid::-webkit-scrollbar{width:5px}
.mat-grid::-webkit-scrollbar-track{background:transparent}
.mat-grid::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}

.mat-card{position:relative;padding:13px 12px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:var(--transition);display:flex;align-items:center;gap:10px;background:var(--bg2)}
.mat-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.mat-card.selected{border-color:var(--gold);background:linear-gradient(135deg,var(--gold-wash),transparent 70%),var(--bg2);box-shadow:0 0 0 1px var(--gold),var(--shadow-gold)}
.mat-card.disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.mat-card .swatch{width:26px;height:26px;border-radius:8px;flex-shrink:0;border:1px solid var(--swatch-border);box-shadow:inset 0 1px 2px rgba(255,255,255,.25),inset 0 -2px 3px rgba(0,0,0,.15)}
.mat-card .swatch.photo{width:56px;height:56px;background-size:cover;background-position:center;background-color:#fff;box-shadow:none}
.mat-card .swatch.photo{position:relative}
.swatch-zoom-btn{position:absolute;right:-5px;bottom:-5px;width:20px;height:20px;border-radius:50%;border:1px solid var(--swatch-border);background:var(--bg2,#fff);color:var(--text-dim,#666);font-size:11px;line-height:18px;text-align:center;cursor:zoom-in;box-shadow:0 1px 3px rgba(0,0,0,.25);padding:0}
.swatch-zoom-btn:hover{color:var(--gold,#a8842c);border-color:var(--gold,#a8842c)}
.swatch-lightbox{position:fixed;inset:0;background:rgba(24,20,12,.8);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:99999;padding:20px}
.swatch-lightbox.open{display:flex}
.swatch-lightbox .slb-box{background:var(--bg2,#fff);border-radius:16px;padding:14px 14px 12px;width:min(90vw,600px);max-width:min(90vw,600px);box-shadow:0 24px 64px rgba(0,0,0,.45);text-align:center;position:relative}
.swatch-lightbox img{display:block;width:100%;max-width:min(86vw,560px);max-height:62vh;object-fit:contain;border-radius:10px;margin:0 auto;background:var(--bg3,#f2efe9)}
.swatch-lightbox .slb-name{margin-top:10px;font-weight:600;color:var(--text,#222);font-size:.95rem}
.swatch-lightbox .slb-close{position:absolute;top:-12px;right:-12px;width:32px;height:32px;border-radius:50%;border:none;background:var(--gold,#a8842c);color:#fff;font-size:16px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.35)}
.mat-card .name{font-size:.78rem;line-height:1.35;color:var(--text-dim);font-weight:500}
.mat-card.selected .name{color:var(--text);font-weight:600}
.mat-card.selected::after{content:'✓';position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;background:var(--gold-grad);color:var(--done-dot-text);font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);animation:badgePop .35s cubic-bezier(.34,1.56,.64,1)}
.mat-card .staff-price{margin-left:auto;font-size:.7rem;font-weight:600;color:var(--gold);white-space:nowrap;padding-left:6px;flex-shrink:0}
.staff-item-prices{margin:10px 0 14px;padding:10px 12px;border:1px dashed var(--gold);border-radius:var(--radius);background:var(--bg2)}
.staff-item-prices .sip-title{font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.staff-item-prices .sip-row{display:flex;justify-content:space-between;gap:10px;font-size:.74rem;color:var(--text-dim);padding:2px 0}
.staff-item-prices .sip-row .p{color:var(--text);font-weight:600;white-space:nowrap}

/* Width & Profile selectors */
.width-control{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.width-control input[type=range]{flex:1}
input[type=range]{-webkit-appearance:none;appearance:none;height:6px;border-radius:999px;background:var(--bg4);outline:none;cursor:pointer;border:none;padding:0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:var(--gold-grad);border:2.5px solid var(--bg2);box-shadow:var(--shadow-sm),0 0 0 1px var(--gold-ring);cursor:grab;transition:transform .15s ease}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.12)}
input[type=range]::-webkit-slider-thumb:active{cursor:grabbing;transform:scale(1.05)}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--gold-grad);border:2.5px solid var(--bg2);box-shadow:var(--shadow-sm),0 0 0 1px var(--gold-ring);cursor:grab}
input[type=range]::-moz-range-track{height:6px;border-radius:999px;background:var(--bg4)}
.width-val{font-family:var(--font-display);font-size:1.55rem;font-weight:500;color:var(--gold);min-width:64px;text-align:center}

.profile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:10px}
.profile-card{position:relative;padding:15px 10px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;text-align:center;font-size:.76rem;font-weight:500;color:var(--text-dim);transition:var(--transition);background:var(--bg2)}
.profile-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.profile-card.selected{border-color:var(--gold);color:var(--text);background:linear-gradient(135deg,var(--gold-wash),transparent 70%),var(--bg2);box-shadow:0 0 0 1px var(--gold),var(--shadow-gold);font-weight:600}
.profile-card.disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.profile-card svg{display:block;margin:0 auto 8px;opacity:.75;transition:opacity .2s ease}
.profile-card.selected svg{opacity:1}
.profile-card.selected::after{content:'✓';position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;background:var(--gold-grad);color:var(--done-dot-text);font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);animation:badgePop .35s cubic-bezier(.34,1.56,.64,1)}

/* Strip Composer */
.composer{margin-top:8px}
.composer-strips{display:flex;gap:2px;min-height:64px;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;align-items:stretch;flex-wrap:nowrap;box-shadow:inset 0 2px 6px rgba(0,0,0,.05)}
.strip-block{position:relative;min-width:28px;padding:4px 2px;border-radius:5px;text-align:center;cursor:pointer;transition:var(--transition);display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid transparent;box-shadow:var(--shadow-sm)}
.strip-block:hover{border-color:var(--strip-hover);transform:translateY(-1px)}
.strip-block.selected{border-color:var(--gold)}
.strip-block .s-name{font-size:.52rem;color:var(--strip-text);writing-mode:vertical-rl;text-orientation:mixed;line-height:1;max-height:50px;overflow:hidden}
.strip-block .s-width{font-size:.57rem;color:var(--strip-text-dim);margin-top:2px}
.strip-block .s-remove{position:absolute;top:-7px;right:-7px;width:17px;height:17px;border-radius:50%;background:var(--danger);color:#fff;font-size:.62rem;display:none;align-items:center;justify-content:center;line-height:1;box-shadow:var(--shadow-sm)}
.strip-block:hover .s-remove{display:flex}
.strip-block[draggable=true]{cursor:grab}
.strip-block[draggable=true]:active{cursor:grabbing}
.strip-block.dragging{opacity:.3;transform:scale(.95)}
.strip-block.drag-over-left{box-shadow:inset 3px 0 0 var(--gold)}
.strip-block.drag-over-right{box-shadow:inset -3px 0 0 var(--gold)}
.composer-strips.drag-active{background:var(--bg4)}

/* Strip move arrows */
.strip-arrows{display:flex;justify-content:center;gap:6px;margin-top:8px;margin-bottom:4px}
.strip-arrow{width:36px;height:32px;border-radius:999px;border:1px solid var(--gold);color:var(--gold);background:var(--gold-wash);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer;transition:var(--transition);line-height:1}
.strip-arrow:hover{background:var(--gold-grad);color:var(--done-dot-text);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.strip-arrow:active{transform:scale(.92)}
.strip-edit-btn{padding:6px 14px;border-radius:999px;border:1px solid var(--border);color:var(--text-dim);font-size:.64rem;font-weight:500;cursor:pointer;background:var(--bg2);transition:var(--transition);box-shadow:var(--shadow-sm)}
.strip-edit-btn:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-1px)}
.strip-block.active-selected{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),var(--shadow-gold)}

.remaining-width{font-size:.8rem;color:var(--text-muted);margin-bottom:12px}
.remaining-width .val{color:var(--gold);font-weight:600}

.composer-actions{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:18px}
.btn{padding:10px 20px;border-radius:999px;font-size:.82rem;font-weight:600;transition:var(--transition);letter-spacing:.01em}
.btn-gold{background:var(--gold-grad);color:var(--btn-next-text);border:none;box-shadow:var(--shadow-sm)}
.btn-gold:hover{background:var(--gold-grad-hover);transform:translateY(-1px);box-shadow:var(--shadow-gold)}
.btn-gold:active{transform:translateY(0) scale(.98)}
.btn-outline{border:1px solid var(--border);color:var(--text-dim);background:var(--bg2)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.btn-sm{padding:7px 14px;font-size:.72rem}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* Templates */
.templates{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.template-btn{padding:7px 15px;border-radius:999px;border:1px dashed var(--border-light);font-size:.7rem;font-weight:500;color:var(--text-muted);transition:var(--transition);background:var(--bg2)}
.template-btn:hover{border-color:var(--gold);border-style:solid;color:var(--gold);transform:translateY(-1px);box-shadow:var(--shadow-sm)}

/* Add strip modal */
.modal-overlay{position:fixed;inset:0;background:var(--overlay);-webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px);z-index:10000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex;animation:fadeIn .25s ease}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;max-width:580px;width:100%;max-height:82vh;overflow-y:auto;box-shadow:var(--shadow-lg);position:relative}
.modal h3{font-family:var(--font-display);font-weight:500;font-size:1.35rem;margin-bottom:18px}
.modal-close{position:absolute;top:14px;right:18px;font-size:1.2rem;color:var(--text-muted)}

/* Width picker in modal */
.width-picker{display:flex;align-items:center;gap:12px;margin:12px 0}
.width-picker input[type=number]{width:76px;padding:10px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);text-align:center;font-size:.95rem;outline:none;transition:var(--transition)}
.width-picker input[type=number]:focus{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-wash)}
.width-picker label{font-size:.82rem;color:var(--text-dim)}

/* Finish grid */
.finish-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:10px}
.finish-card{position:relative;padding:15px 12px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-size:.79rem;font-weight:500;color:var(--text-dim);transition:var(--transition);text-align:center;background:var(--bg2)}
.finish-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.finish-card.selected{border-color:var(--gold);color:var(--text);background:linear-gradient(135deg,var(--gold-wash),transparent 70%),var(--bg2);box-shadow:0 0 0 1px var(--gold),var(--shadow-gold);font-weight:600}
.finish-card.disabled{opacity:.3;cursor:not-allowed;pointer-events:none}
.finish-card.selected::after{content:'✓';position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;background:var(--gold-grad);color:var(--done-dot-text);font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);animation:badgePop .35s cubic-bezier(.34,1.56,.64,1)}

/* Size selector */
.size-grid{display:flex;flex-wrap:wrap;gap:7px;margin:14px 0}
.size-btn{width:48px;height:40px;border:1px solid var(--border);border-radius:10px;font-size:.76rem;font-weight:500;color:var(--text-dim);display:flex;align-items:center;justify-content:center;transition:var(--transition);background:var(--bg2)}
.size-btn:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.size-btn.selected{border-color:transparent;color:var(--done-dot-text);background:var(--gold-grad);box-shadow:var(--shadow-gold);font-weight:700;transform:scale(1.05)}
.size-btn.quarter{font-size:.66rem;opacity:.75}
.size-btn.quarter.selected{opacity:1}

/* Help links */
.help-link{transition:var(--transition)}
.help-link:hover{border-color:var(--gold)!important;transform:translateY(-1px);box-shadow:var(--shadow-sm)}

/* Summary */
.summary-section{margin-bottom:22px}
.summary-section h4{font-family:var(--font-display);font-weight:500;font-size:1.15rem;color:var(--text);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.summary-row{display:flex;justify-content:space-between;padding:7px 0;font-size:.84rem}
.summary-row .label{color:var(--text-muted)}
.summary-row .value{color:var(--text);font-weight:600}
.summary-row .price{color:var(--gold)}

.summary-total{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border:1px solid var(--gold-ring);border-radius:var(--radius);margin-top:12px;font-size:1rem;background:linear-gradient(135deg,var(--gold-wash),transparent 70%),var(--bg2);box-shadow:var(--shadow-sm)}
.summary-total .label{font-weight:600}
.summary-total .price{font-family:var(--font-display);font-size:1.7rem;color:var(--gold);font-weight:500}

/* Email form */
.email-form{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-top:18px;box-shadow:var(--shadow)}
.email-form h4{font-family:var(--font-display);font-weight:500;font-size:1.2rem;margin-bottom:14px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:.7rem;font-weight:600;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.1em}
.form-row input,.form-row textarea{width:100%;padding:12px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);font-size:.88rem;outline:none;transition:var(--transition)}
.form-row input:focus,.form-row textarea:focus{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-wash)}
.form-row textarea{resize:vertical;min-height:64px}

/* Engraving */
.engraving-input{width:100%;padding:12px 16px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);font-size:.88rem;color:var(--text);margin-bottom:10px;outline:none;transition:var(--transition)}
.engraving-input:focus{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-wash)}
.engraving-preview{font-family:var(--font-display);font-size:1.25rem;color:var(--gold);text-align:center;padding:14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);letter-spacing:.1em;min-height:44px;margin-bottom:14px;font-style:italic}

/* Nav buttons */
.nav-buttons{display:flex;justify-content:space-between;margin-top:28px;padding-top:20px;border-top:1px solid var(--border)}
.btn-nav{padding:13px 30px;border-radius:999px;font-size:.86rem;font-weight:600;letter-spacing:.02em;transition:var(--transition)}
.btn-prev{border:1px solid var(--border);color:var(--text-dim);background:var(--bg2)}
.btn-prev:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-1px);box-shadow:var(--shadow-sm)}
.btn-next{background:var(--gold-grad);color:var(--btn-next-text);box-shadow:var(--shadow-sm)}
.btn-next:hover{background:var(--gold-grad-hover);transform:translateY(-1px);box-shadow:var(--shadow-gold)}
.btn-next:active{transform:translateY(0) scale(.98)}
.btn-next:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* Validation messages */
.validation-msg{padding:11px 14px;border-radius:var(--radius);font-size:.76rem;margin-bottom:12px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.validation-msg.error{background:var(--val-error-bg);border:1px solid var(--val-error-border);color:var(--val-error-text)}
.validation-msg.warn{background:var(--val-warn-bg);border:1px solid var(--val-warn-border);color:var(--val-warn-text)}
.validation-msg.info{background:var(--val-info-bg);border:1px solid var(--val-info-border);color:var(--val-info-text)}
/* Rule violation toast */
.rule-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10000;background:#5c1a1a;color:#ffd6d6;padding:13px 22px;border-radius:12px;border:1px solid #8b2a2a;font-size:.84rem;line-height:1.45;max-width:440px;text-align:center;box-shadow:var(--shadow-lg);animation:toastIn .3s ease,toastOut .4s ease 3s forwards;pointer-events:none;font-family:'DM Sans',sans-serif}
.exit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);z-index:10001;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.exit-modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:30px 26px;max-width:410px;width:100%;box-shadow:var(--shadow-lg);text-align:center;font-family:'DM Sans',sans-serif}
.exit-modal h3{font-family:var(--font-display);font-size:1.4rem;font-weight:500;color:var(--gold);margin:0 0 8px}
.exit-modal p{font-size:.84rem;color:var(--text-muted);margin:0 0 16px;line-height:1.55}
.exit-modal input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:.88rem;margin-bottom:12px;box-sizing:border-box;background:var(--input-bg);color:var(--text);outline:none;transition:var(--transition)}
.exit-modal input:focus{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-wash)}
.exit-modal .exit-err{color:#c0392b;font-size:.72rem;margin:-8px 0 10px;display:none}
.exit-modal .exit-btns{display:flex;gap:10px}
.exit-modal .exit-btns button{flex:1;padding:12px;border-radius:999px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:var(--transition)}
.exit-modal .btn-exit-submit{background:var(--gold-grad);color:var(--btn-next-text);box-shadow:var(--shadow-sm)}
.exit-modal .btn-exit-submit:hover{background:var(--gold-grad-hover)}
.exit-modal .btn-exit-skip{background:transparent;border:1px solid var(--border)!important;color:var(--text-muted)}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}

/* ── MOBILE ── */
@media(max-width:840px){
  .main-layout{grid-template-columns:1fr;gap:14px}
  .preview-col{position:relative;top:0}
  .mat-grid{grid-template-columns:repeat(auto-fill,minmax(125px,1fr));max-height:270px}
  .step-dot .line{width:18px}

  .ring-specs{gap:6px;margin-top:10px;font-size:.64rem;flex-wrap:wrap;justify-content:center}
  .ring-specs span{padding:4px 9px}
  .strip-legend{gap:4px;margin-top:8px}

  /* Price bar handled by sticky bar on all screens */

  /* Material cards — bigger tap targets */

  .finish-card{padding:15px 10px;font-size:.77rem;min-height:46px}

  /* Size buttons — bigger tap targets */
  .size-grid{gap:5px}
  .size-btn{width:48px;height:42px;font-size:.74rem;min-height:42px}

  /* Strip composer — taller blocks for touch */
  .composer-strips{min-height:74px;padding:9px;gap:3px}

  /* Strip arrows mobile */
  .strip-arrows{gap:7px;margin-top:9px}
  .strip-arrow{width:46px;height:42px;font-size:1rem}
  .strip-edit-btn{padding:9px 17px;font-size:.74rem;min-height:42px}

  /* Buttons — bigger tap targets */
  .btn{padding:13px 20px;font-size:.84rem;min-height:46px}
  .btn-sm{padding:11px 15px;font-size:.76rem;min-height:42px}
  .btn-nav{padding:13px 22px;font-size:.84rem;min-height:46px}

  /* Width control — stack on mobile */
  .width-control{gap:9px}
  .width-control span:nth-child(3){order:3}

  /* Nav buttons full width */

  .modal-overlay{padding:0;align-items:flex-end}

  .summary-row{font-size:.78rem;padding:8px 0}

/* Sticky mobile price bar */

   One section open at a time. No ledger/auto-scroll/floating submit.
   ======================================================================== */

.v2-app{max-width:1400px;margin:0 auto;min-height:100vh;min-height:100dvh}

.acc-titles{flex:1;min-width:0;display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.acc-title{font-family:var(--font-body);font-weight:700;font-size:1.05rem;letter-spacing:.06em;text-transform:uppercase;color:var(--text)}
.acc-summary{font-size:.82rem;color:var(--gold);font-weight:500}
.acc-chev{flex:0 0 auto;color:var(--text-muted);font-size:.8rem;transition:transform .28s cubic-bezier(.22,1,.36,1)}
.acc-panel.open .acc-chev{transform:rotate(90deg);color:var(--gold)}

/* body: grid-rows collapse animation */
.acc-body-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .3s cubic-bezier(.22,1,.36,1)}
.acc-panel.open .acc-body-wrap{grid-template-rows:1fr}
.acc-body-inner{overflow:hidden;min-height:0}
.acc-body{padding:4px 4px 24px 50px}
.acc-body .panel-title{font-size:.95rem;color:var(--text-dim);margin-bottom:10px}
.acc-body .panel-desc{font-size:.8rem;color:var(--text-muted);margin-bottom:14px;line-height:1.5}

/* price: bottom-right of the list, hidden by default (JS toggles display) */
.v2-price{
  display:none;text-align:right;padding:16px 24px;
  font-family:var(--font-display);font-size:2rem;font-weight:500;color:var(--gold);
}

/* error banner host */
#v2-error-host #v2-pricing-error{background:var(--val-error-bg);border:1px solid var(--val-error-border);color:var(--val-error-text);border-radius:var(--radius);padding:12px 16px;margin:12px 24px;font-size:.85rem}
#v2-error-host #v2-pricing-error button{margin-left:12px;background:var(--gold-grad);color:#fff;border:none;border-radius:999px;padding:6px 14px;cursor:pointer}

/* toast */
.v2-toast-wrap{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:10001;display:flex;flex-direction:column;gap:8px;pointer-events:none;width:calc(100% - 36px);max-width:420px}

/* ============ MOBILE (<768px): preview pinned to top, list scrolls under ============ */
@media(max-width:767px){
  .v2-preview{
    position:sticky;top:0;z-index:50;min-height:240px;
    border-bottom:1px solid var(--border);
    box-shadow:0 4px 18px rgba(0,0,0,.35);
  }
  .acc-panel{scroll-margin-top:260px}
  .acc-stack{padding:8px 16px 40px}
  .acc-stack::before{left:calc(16px + 17px)}
  .acc-body{padding-left:44px}
}

/* ============ DESKTOP/TABLET (>=768px): fixed left viewer, right list scrolls ============ */
@media(min-width:768px){
  .v2-layout{grid-template-columns:minmax(380px,46%) 1fr;min-height:100vh;min-height:100dvh}
  .v2-preview{
    position:sticky;top:0;align-self:start;height:100vh;height:100dvh;
    min-height:0;
  }
  .acc-stack{padding-top:24px}
}
@media(min-width:1200px){
  .v2-layout{grid-template-columns:minmax(460px,50%) 1fr}
}

.acc-tick{display:none;flex:0 0 auto;margin-left:-8px;color:var(--success);font-weight:800;font-size:1rem}
.acc-panel.filled .acc-tick{display:inline-flex}

.v2-modal-frame{position:relative;max-width:580px;width:100%;display:flex}
.v2-modal-frame>.modal{max-width:100%;width:100%}
.v2-modal-x{position:absolute;top:-16px;right:-16px;width:36px;height:36px;border-radius:50%;font-size:1.3rem;line-height:1;background:var(--bg2);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;z-index:12;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center}
.modal>button[style*="right:16px"]{display:none!important}
.v2-modal-x:hover{color:var(--gold)}
.swatch-lightbox{position:relative}
.eng-font-wrap{margin:4px 0 14px}
.eng-font-label{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-muted);margin-bottom:6px}
.eng-font-select{width:100%;padding:12px 16px;background:var(--input-bg);border:1px solid var(--border);border-radius:var(--radius);font-size:.88rem;color:var(--text);outline:none;cursor:pointer}
.eng-font-select:focus{border-color:var(--gold);box-shadow:0 0 0 4px var(--gold-wash)}
</style>

      <section class="acc-panel" id="acc-panel-finish">

          <span class="acc-num">7</span><span class="acc-tick" aria-hidden="true">✓</span>
          <span class="acc-titles"><span class="acc-title">Summary</span><span class="acc-summary" id="acc-sum-summary"></span></span>

<div class="v2-toast-wrap" id="v2-toast-wrap"></div>

<!-- ===== BEGIN VERBATIM V1 ENGINE (port, do not rewrite) ===== -->
<script>
// ═══════════════════════════════════════════════════
// JBJ RING DESIGNER — Phase 1
// ═══════════════════════════════════════════════════

// ── THEME TOGGLE ──
(function initTheme(){
  const saved = localStorage.getItem('jbj-theme');
  if(saved === 'dark') document.documentElement.setAttribute('data-theme','dark');
  // Light is default (no attribute needed)
  updateToggleIcons();
})();
function toggleTheme(){
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  if(isDark){
    document.documentElement.removeAttribute('data-theme');
    localStorage.setItem('jbj-theme','light');
  } else {
    document.documentElement.setAttribute('data-theme','dark');
    localStorage.setItem('jbj-theme','dark');
  }
  updateToggleIcons();
  // Re-render ring to pick up new theme colors
  if(typeof renderRing === 'function') renderRing();
}
function updateToggleIcons(){
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const sun = document.getElementById('iconSun');
  const moon = document.getElementById('iconMoon');
  if(sun) sun.style.display = isDark ? 'block' : 'none';
  if(moon) moon.style.display = isDark ? 'none' : 'block';
}
document.addEventListener('DOMContentLoaded',()=>{
  const btn = document.getElementById('themeToggle');
  if(btn) btn.addEventListener('click', toggleTheme);
});

// ── DATA (loaded below) ──
let DATA = null;

// ── CONSTANTS ──
const STEPS = [
  {id:'size', label:'Ring Size', num:1, tip:'Choose your ring size — if unsure, order a ring sizer or visit a local jeweler'},
  {id:'metal', label:'Base Metal', num:2, tip:'Pick the main metal for your ring — this forms the structure and edges'},
  {id:'width', label:'Width & Profile', num:3, tip:'Set how wide your ring is and choose its cross-section shape'},
  {id:'compose', label:'Band Composer', num:4, tip:'Add inlay materials like wood, stone, or meteorite between the metal edges'},
  {id:'sleeve', label:'Sleeve', num:5, tip:'Choose the inner liner material — what touches your finger'},
  {id:'finish', label:'Finish', num:6, tip:'Select a surface texture — polished, brushed, matte, and more'},
  {id:'summary', label:'Summary', num:7, tip:'Review your custom ring design and get your estimated price'}
];

const METAL_GROUPS = ['Metals','Metals Precious'];
const SLEEVE_MATERIALS = ['Titanium','Tungsten','Zirconium','Black Ceramic','Damascus','Stainless','Platinum',
  'Yellow 10K','Yellow 14K','Yellow 18K','White 10K','White 14K','White 18K','Rose 14K','Rose 18K','Silver'];

const PROFILES = [
  'Flat','Round','Tension','Bevel','Beveled','Dome','Half Dome','Half Round','Knife Edge',
  'Pipe Cut','Square','Signet','Cathedral','Comfort Fit','Euro Shank','Barrel','Wavy',
  'Concave','Convex','Milgrain','Stepped','Grooved','Custom','D-Shape'
];

const FINISHES = ['Polished','Brushed','Matte','Sandblasted','Deep Frost','Frost','Hammer'];

const INLAY_PROFILES = ['Flat','Round'];

const RING_SIZES = [];
for(let s=4; s<=14; s+=0.25) RING_SIZES.push(s);

const WIDTHS = [];
for(let w=2; w<=14; w+=1) WIDTHS.push(w);

// ── STATE ──
const state = {
  step: 0,
  baseMetal: null,
  ringWidth: 8,
  profile: 'Flat',
  wantsInlays: true, // null=not yet chosen, true/false after Step 3
  strips: [],
  selectedStrip: -1,
  sleeve: null,
  finish: 'Polished',
  ringSize: null,
  engraving: '',
  email: '',
  notes: '',
  spotPrices: null, // no hardcoded fallback — populated by fetchSpotPrices() on load; state.spotsLoaded gates the Submit button until real prices arrive
  spotsLoaded: false
};

const QUOTE_WORKER_URL = 'https://jbj-ring-quote.johan-475.workers.dev/';
// Unicode-safe base64 helpers (btoa/atob crash on non-Latin-1 chars like accented names or emoji)
function utoa(str){return btoa(unescape(encodeURIComponent(str)));}
function atou(b64){return decodeURIComponent(escape(atob(b64)));}
// Debounce helper for slider input (reduces DOM thrashing on slow devices)
let _dbTimer=null;
function debounceSlider(fn,ms){return function(){clearTimeout(_dbTimer);_dbTimer=setTimeout(fn,ms||50);};}
const _staffMode = new URLSearchParams(window.location.search).has('staff');
if(_staffMode) document.body.classList.add('staff-mode');

// ── UNDO STACK ──
const undoStack=[];
const UNDO_MAX=30;
function pushUndo(){
  undoStack.push({strips:state.strips.map(s=>({...s})),selectedStrip:state.selectedStrip});
  if(undoStack.length>UNDO_MAX) undoStack.shift();
}
function undoAction(){
  if(undoStack.length===0) return;
  const prev=undoStack.pop();
  state.strips=prev.strips;
  state.selectedStrip=prev.selectedStrip;
  const col=$('#controlsCol');
  if(col) renderComposePanel(col);
  renderRing();
  updatePrice();
}

// ── POPULAR WOODS (shown under "Woods" group; rest go to "Woods-other") ──
const POPULAR_WOODS=new Set([
  'Customer Wood','Maple (Burl)','Bloodwood','Ironwood','Bocote',
  'Black Ash Burl','Aspen','Ebony (Black)','Jack Daniels Wood',
  'Box Elder Burl (Blue)','Box Elder Burl (Green)','Box Elder Burl (Purple)'
]);

// ── 3D RING VIEW STATE ──
const ringView = {
  elevation: 0,    // degrees, camera tilt (0=straight-on band face, up to 65)
  azimuth: 90,     // degrees, rotation around ring (90=band face toward camera)
  isDragging: false,
  lastX: 0,
  lastY: 0,
  canvas: null
};

// ── HELPERS ──
function $(sel,ctx=document){return ctx.querySelector(sel)}
function $$(sel,ctx=document){return [...ctx.querySelectorAll(sel)]}
function h(tag,attrs={},children=[]){
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==='class')el.className=v;
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(typeof v==='boolean'){if(v)el.setAttribute(k,'');} 
    else el.setAttribute(k,v);
  }
  for(const c of(Array.isArray(children)?children:[children])){
    if(typeof c==='string')el.appendChild(document.createTextNode(c));
    else if(c)el.appendChild(c);
  }
  return el;
}

// Photo swatch for base metals (uploaded product shots); falls back to color dot
const ZOOM_SWATCHES=new Set(["Afzelia","Amboyna","Antler","Aspen","Bamboo","Birch","Black Ash Burl","Black Ceramic","Blackwood (African)","Bloodwood","Bocote","Box Elder Burl (Blue)","Box Elder Burl (Flame)","Box Elder Burl (Gold)","Box Elder Burl (Green)","Box Elder Burl (Magenta)","Box Elder Burl (Peridot)","Box Elder Burl (Purple)","Box Elder Burl (Red)","Briar","Bubinga","Buckeye Burl","Canary","Cedar (Red)","Cherry Burl","Cherry Wood","Chrysocolla","Cocobolo","Collibah","Cypress","Dalmata","Damascus","Dino Bone","Dino Bone Crushed","Dymonwood (camo)","Ebony (Black & White)","Ebony (Black)","Ebony (Macassar)","Eucalyptus (Red Gum)","Garapa","Gibeon Meteorite","Goldstone","Holly","Homino Negro","Ipe","Ironwood","Ironwood (Burl)","Jack Daniels Wood","Jade - Black","Jade - Green","Jasper","Jubillo","Kauri","King","Koa","Lapis Lazuli","Leopard","Lignum Vitae","Lyptus","Madrone","Mahogany","Malachite - Synthetic","Mangowood","Maple","Maple (Birds Eye)","Maple (Burl)","Maple (Curly)","Maple (Spalted Burl)","Marblewood","Mesquite","Mesquite (Black)","Mesquite (Burl)","Metal Mokume","Mokume-Black & Gold","Mokume-Black & White","Mokume-Black and Red","Mokume-Cobaltium","Mokume-White","Mulberry","Oak","Oak (1st Generation)","Obsidian","Olive","Olive (Bethlehem)","Olive (Jerusalem)","Osage","Padauk","Palm (Black)","Palm (Red)","Pear","Petrified Wood","Platinum","Purple Heart","Queen","Redwood (Natural)","Redwood (Ruby)","Redwood (Sequoia)","Rose 14K","Rose 18K","Rosewood (Amazon)","Rosewood (Bolivian)","Rosewood (Brazilian)","Rosewood (Carribean)","Rosewood (East Indian)","Rosewood (Honduran Burl)","Rosewood (Honduran)","Rowan","Sand","Silver","Sindora","Snakewood","Stainless","Stardust","Stinkwood (Black)","Supply Your Own Ash","Supply Your Own Fur","Tamarind","Teak","Teak (Burl)","Tineo","Titanium","Tulipwood","Tungsten","Turquoise","Walnut","Wenge","White 10K","White 14K","White 18K","White Gold Flakes and Stardust","Yellow 10K","Yellow 14K","Yellow 18K","Yellow Gold Flakes and Stardust","Zebrawood","Zirconium","Zircote"]);
function matSwatch(name){
  const img=((typeof MATERIAL_IMAGES!=='undefined')&&MATERIAL_IMAGES[name])||((typeof BASE_METAL_IMAGES!=='undefined')&&BASE_METAL_IMAGES[name]);
  if(img){
    const sw=h('div',{class:'swatch photo',style:{backgroundImage:'url(data:image/jpeg;base64,'+img+')'}});
    if(typeof ZOOM_SWATCHES!=='undefined'&&ZOOM_SWATCHES.has(name)){
      sw.appendChild(h('button',{class:'swatch-zoom-btn',type:'button',title:'View '+name+' up close','aria-label':'Zoom '+name,onClick:(e)=>{e.stopPropagation();e.preventDefault();openSwatchZoom(name);}},['\u2315']));
    }
    return sw;
  }
  return h('div',{class:'swatch',style:{background:getColor(name)}});
}

// Full-size swatch lightbox — loads swatches/<slug>.jpg from the repo on demand;
// falls back to the embedded thumbnail if the file isn't uploaded yet.
function swatchSlug(n){return n.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');}
function openSwatchZoom(name){
  let lb=$('#swatchLightbox');
  if(!lb){
    lb=h('div',{id:'swatchLightbox'});
    document.body.appendChild(lb);
  }
  // (Re)build contents if the box/img aren't present yet (static #swatchLightbox starts empty)
  if(!lb.querySelector('img')){
    lb.className='swatch-lightbox';
    lb.onclick=(e)=>{if(e.target===lb)lb.classList.remove('open');};
    lb.appendChild(h('div',{class:'slb-box'},[
      h('button',{class:'slb-close',type:'button','aria-label':'Close',onClick:()=>lb.classList.remove('open')},['\u00d7']),
      h('img',{alt:'Material swatch'}),
      h('div',{class:'slb-name'})
    ]));
    document.addEventListener('keydown',(e)=>{if(e.key==='Escape')lb.classList.remove('open');});
  }
  const img=lb.querySelector('img');
  img.onerror=()=>{
    img.onerror=null;
    const emb=((typeof MATERIAL_IMAGES!=='undefined')&&MATERIAL_IMAGES[name])||((typeof BASE_METAL_IMAGES!=='undefined')&&BASE_METAL_IMAGES[name]);
    if(emb)img.src='data:image/jpeg;base64,'+emb;
  };
  img.src='swatches/'+swatchSlug(name)+'.jpg';
  img.alt=name+' material swatch';
  lb.querySelector('.slb-name').textContent=name;
  lb.classList.add('open');
}

function getColor(name){
  if(!DATA)return '#666';
  // Direct match
  if(DATA.c[name])return DATA.c[name];
  // Check group defaults
  const mat=DATA.m[name];
  if(!mat)return '#666';
  const g=mat.g;
  if(['Metals','Metals Precious'].includes(g))return DATA.c._default_metal||'#C0C0C0';
  if(g==='Woods')return DATA.c._default_wood||'#8B5A2B';
  if(g==='Lapidary')return DATA.c._default_lapidary||'#708090';
  return DATA.c._default_organic||'#D2B48C';
}

function isLightColor(hex){
  const c=hex.replace('#','');
  const r=parseInt(c.substring(0,2),16)/255;
  const g=parseInt(c.substring(2,4),16)/255;
  const b=parseInt(c.substring(4,6),16)/255;
  const toL=v=>v<=0.04045?v/12.92:Math.pow((v+0.055)/1.055,2.4);
  return 0.2126*toL(r)+0.7152*toL(g)+0.0722*toL(b)>0.4;
}

function isMetal(name){
  return name===state.baseMetal;
}

function isMetalGroup(name){
  if(!DATA||!DATA.m[name])return false;
  return['Metals','Metals Precious'].includes(DATA.m[name].g);
}

function isPrecious(name){
  if(!DATA||!DATA.m[name])return false;
  return DATA.m[name].g==='Metals Precious'||name==='Platinum';
}

function getMinWidth(materialName, usage='solid_inlay'){
  if(!DATA||!DATA.m[materialName])return 0.5;
  const mins=DATA.m[materialName].mi;
  return mins[usage]||0.25;
}

function getMaterialsByGroup(group){
  if(!DATA)return[];
  return Object.entries(DATA.m)
    .filter(([n,m])=>m.g===group)
    .map(([n])=>n)
    .sort();
}

function getAllGroups(){
  if(!DATA)return[];
  const groups=new Set();
  Object.values(DATA.m).forEach(m=>groups.add(m.g));
  const sorted=[...groups].sort();
  const wi=sorted.indexOf('Woods');
  if(wi>=0){
    sorted[wi]='most popular Woods';
    sorted.splice(wi+1,0,'other Woods');
  }
  // Priority groups first, then rest in existing order
  const priority=['Meteorite','Dinosaur Bone','Antler','most popular Woods'];
  const top=priority.filter(g=>sorted.includes(g));
  const rest=sorted.filter(g=>!priority.includes(g));
  return [...top,...rest];
}

// ── PRICING ENGINE ──
// HMAC price hash implemented in ring-quote-worker.js (requires PRICE_HMAC_SECRET env var)
function calcPrice(){
  if(!DATA||!state.baseMetal||!state.ringSize)return null;
  try{
  let total=0;
  const breakdown=[];

  const bm=state.baseMetal;
  const slv=state.sleeve||bm;
  const hasInlays=state.strips.some(s=>!isMetal(s.material));
  const hasNonMetalInlays=state.strips.some(s=>!isMetal(s.material)&&!isMetalGroup(s.material));
  // misc() reads misc_costs from jbj-pricing.json (via DATA.misc_costs). NO hardcoded fallback —
  // if a misc cost is missing, calcPrice() fails loudly (caught below, returns null → UI shows "—" instead of a guessed price).
  const misc=(k)=>{
    if(DATA.misc_costs&&DATA.misc_costs[k]!=null) return DATA.misc_costs[k];
    throw new Error('Missing misc_costs.'+k+' in pricing data');
  };
  
  // 1. Base metal cost (always included, as if sleeve = base metal)
  if(isPrecious(bm)){
    const pCost=calcPreciousMetalCost(bm, state.ringWidth, state.ringSize, hasInlays);
    total+=pCost;
    breakdown.push({label:`${bm} (Base Metal)`, price:pCost});
    total+=misc('precious_base_metal');
    breakdown.push({label:`Precious Base Metal Misc`, price:misc('precious_base_metal')});
  } else if(DATA.p[bm] && DATA.p[bm].per_mm_base){
    // Per-mm pricing (e.g. Metal Mokume)
    const cost=DATA.p[bm].per_mm_base*state.ringWidth;
    total+=cost;
    breakdown.push({label:`${bm} (Base Metal, ${state.ringWidth}mm)`, price:cost});
    total+=misc('non_precious_base_metal');
    breakdown.push({label:`Base Metal Misc`, price:misc('non_precious_base_metal')});
  } else {
    const pData=DATA.p[bm];
    if(pData){
      let cost=0;
      if(hasNonMetalInlays && pData.sleeve_with_inlay) cost=pData.sleeve_with_inlay;
      else if(pData.sleeve) cost=pData.sleeve;
      else if(pData.full_ring) cost=pData.full_ring;
      else if(pData.fixed_price) cost=pData.fixed_price;
      total+=cost;
      breakdown.push({label:`${bm} (Base Metal)`, price:cost});
      total+=misc('non_precious_base_metal');
      breakdown.push({label:`Base Metal Misc`, price:misc('non_precious_base_metal')});
    }
  }
  
  // 2. Sleeve adder (only when sleeve is different from base metal)
  if(slv!==bm){
    if(isPrecious(slv)){
      const sCost=calcPreciousSleeveCost(slv, state.ringWidth, state.ringSize);
      total+=sCost;
      breakdown.push({label:`${slv} (Sleeve)`, price:sCost});
      total+=misc('precious_sleeve');
      breakdown.push({label:`Precious Sleeve Metal Misc`, price:misc('precious_sleeve')});
    } else if(DATA.p[slv] && DATA.p[slv].per_mm_sleeve){
      const cost=DATA.p[slv].per_mm_sleeve*state.ringWidth;
      total+=cost;
      breakdown.push({label:`${slv} (Sleeve, ${state.ringWidth}mm)`, price:cost});
      total+=misc('non_precious_sleeve');
      breakdown.push({label:`Sleeve Metal Misc`, price:misc('non_precious_sleeve')});
    } else {
      const sData=DATA.p[slv];
      if(sData){
        let cost=0;
        if(hasNonMetalInlays && sData.sleeve_with_inlay) cost=sData.sleeve_with_inlay;
        else if(sData.sleeve) cost=sData.sleeve;
        else if(sData.fixed_price) cost=sData.fixed_price;
        total+=cost;
        breakdown.push({label:`${slv} (Sleeve)`, price:cost});
        total+=misc('non_precious_sleeve');
        breakdown.push({label:`Sleeve Metal Misc`, price:misc('non_precious_sleeve')});
      }
    }
  }

  // 3. Strip costs (inlays and pinstripes)
  for(const strip of state.strips){
    if(isMetal(strip.material)){
      // Base metal strip (edge/pinstripe) — included in base metal cost
      // Skip charging unless it's a different metal from both base and sleeve
      if(strip.material!==bm && strip.material!==slv){
        if(isPrecious(strip.material)){
          const psCost=calcPinstripePrice(strip.material, strip.width, state.ringSize, 1, false);
          total+=psCost;
          breakdown.push({label:`${strip.material} (${strip.width}mm)`, price:psCost});
        } else {
          const pd=DATA.p[strip.material];
          if(pd && pd.partials){
            total+=pd.partials;
            breakdown.push({label:`${strip.material} (${strip.width}mm)`, price:pd.partials});
          }
        }
      }
    } else if(isMetalGroup(strip.material)){
      // Non-base metal used as inlay
      if(isPrecious(strip.material)){
        const psCost=calcPinstripePrice(strip.material, strip.width, state.ringSize, 1, true);
        total+=psCost;
        breakdown.push({label:`${strip.material} (${strip.width}mm)`, price:psCost});
      } else if(DATA.p[strip.material] && DATA.p[strip.material].inlay_by_width){
        // Width-based inlay pricing (e.g. Zirconium, Damascus, Stainless)
        const tbl=DATA.p[strip.material].inlay_by_width;
        let cost=0;
        for(let i=0;i<tbl.length;i++){
          if(strip.width<=tbl[i][0]||i===tbl.length-1){cost=tbl[i][1];break;}
          if(strip.width>tbl[i][0]&&strip.width<=tbl[i+1][0]){
            const frac=(strip.width-tbl[i][0])/(tbl[i+1][0]-tbl[i][0]);
            cost=tbl[i][1]+frac*(tbl[i+1][1]-tbl[i][1]);break;
          }
        }
        cost=Math.round(cost*100)/100;
        total+=cost;
        breakdown.push({label:`${strip.material} (${strip.width}mm)`, price:cost});
      } else if(DATA.p[strip.material] && DATA.p[strip.material].per_mm_inlay){
        // Per-mm inlay pricing (e.g. Metal Mokume)
        const cost=DATA.p[strip.material].per_mm_inlay*strip.width;
        total+=cost;
        breakdown.push({label:`${strip.material} (${strip.width}mm)`, price:cost});
      } else {
        const pd=DATA.p[strip.material];
        if(pd && pd.partials){
          total+=pd.partials;
          breakdown.push({label:`${strip.material} (${strip.width}mm)`, price:pd.partials});
        }
      }
    } else {
      // Non-metal inlay material (wood, stone, meteorite, etc.)
      const cost=getInlayPrice(strip.material, strip.width);
      total+=cost;
      breakdown.push({label:`${strip.material} (${strip.width}mm)`, price:cost});
    }
  }

  // 4. Inlay misc (only when inlays exist)
  if(hasInlays){
    const hasPreciousInlay=state.strips.some(s=>!isMetal(s.material)&&isPrecious(s.material));
    if(hasPreciousInlay){
      total+=misc('precious_inlay');
      breakdown.push({label:`Precious Inlay Metal Misc`, price:misc('precious_inlay')});
    } else {
      total+=misc('non_precious_inlay');
      breakdown.push({label:`Inlay Metal Misc`, price:misc('non_precious_inlay')});
    }
  }

  return{total, breakdown};
  }catch(e){
    console.error('%c❌ calcPrice() failed: '+e.message,'color:#c0392b;font-weight:bold');
    return null;
  }
}

// ── STAFF MODE: per-item price helpers (display only; mirror calcPrice logic, NO hardcoded fallbacks — unknown = null → '—') ──
function staffFmtPrice(v){
  if(v==null||isNaN(v))return '—';
  if(v===0)return 'included';
  return '$'+v.toFixed(2);
}
function staffBaseMetalPrice(name,widthMm){
  if(!DATA||!DATA.p||!name)return null;

  try{
    const hasInlays=state.strips.some(st=>!isMetal(st.material));

    if(isPrecious(name)){
      if(!state.ringSize)return null;
      return calcPreciousMetalCost(name,w,state.ringSize,hasInlays);
    }
    const pd=DATA.p[name];
    if(!pd)return null;
    if(pd.per_mm_base)return pd.per_mm_base*w;

    if(pd.sleeve)return pd.sleeve;
    if(pd.full_ring)return pd.full_ring;
    if(pd.fixed_price)return pd.fixed_price;
    return null;
  }catch(e){return null;}
}
function staffStripPrice(material,width){
  if(!DATA||!DATA.p||!material||material==='(choose)')return null;
  try{
    const bm=state.baseMetal,slv=state.sleeve||bm;
    if(isMetal(material)){
      if(material===bm||material===slv)return 0;
      if(isPrecious(material)){
        if(!state.ringSize)return null;
        return calcPinstripePrice(material,width,state.ringSize,1,false);
      }
      const pd=DATA.p[material];
      return(pd&&pd.partials!=null)?pd.partials:null;
    }
    if(isMetalGroup(material)){
      if(isPrecious(material)){
        if(!state.ringSize)return null;
        return calcPinstripePrice(material,width,state.ringSize,1,true);
      }
      const pd=DATA.p[material];
      if(pd&&pd.inlay_by_width){
        const tbl=pd.inlay_by_width;let cost=0;
        for(let i=0;i<tbl.length;i++){
          if(width<=tbl[i][0]||i===tbl.length-1){cost=tbl[i][1];break;}
          if(width>tbl[i][0]&&width<=tbl[i+1][0]){const frac=(width-tbl[i][0])/(tbl[i+1][0]-tbl[i][0]);cost=tbl[i][1]+frac*(tbl[i+1][1]-tbl[i][1]);break;}
        }
        return Math.round(cost*100)/100;
      }
      if(pd&&pd.per_mm_inlay)return pd.per_mm_inlay*width;
      return(pd&&pd.partials!=null)?pd.partials:null;
    }
    return getInlayPrice(material,width);
  }catch(e){return null;}
}

function calcPreciousMetalCost(metalName, ringWidthMm, ringSize, hasInlays){
  const f=DATA.f;
  const dia=ringSize*0.8128+11.63;
  const circ=Math.PI*dia;
  const thickness=f.ring_thickness_mm;
  const inlayDepth=f.inlay_depth_mm;
  
  // Total volume
  const totalVol=(circ/10)*(ringWidthMm/10)*(thickness/10);
  
  // Inlay volume (rough estimate based on strips)
  let inlayWidthTotal=0;
  if(hasInlays){
    for(const s of state.strips){
      if(!isMetal(s.material)) inlayWidthTotal+=s.width;
    }
  }
  const inlayVol=(circ/10)*(inlayWidthTotal/10)*(inlayDepth/10);
  const metalVol=totalVol-inlayVol;
  
  // Density
  let density=(0x51B/0x64); // gold default
  if(metalName.includes('Platinum')) density=(0x861/0x64);
  else if(metalName.includes('Silver')) density=(0x419/0x64);
  
  const metalWeight=metalVol*density;
  const weightScrap=metalWeight*1.05;
  
  // Spot price
  if(!state.spotPrices) return 0; // pricing not loaded yet
  let spotPerOz=state.spotPrices.Gold;
  let karatFactor=1;
  if(metalName.includes('Platinum')){spotPerOz=state.spotPrices.Platinum;karatFactor=1;}
  else if(metalName.includes('Silver')){spotPerOz=state.spotPrices.Silver;karatFactor=1;}
  else if(metalName.includes('10K')) karatFactor=10/24;
  else if(metalName.includes('14K')) karatFactor=14/24;
  else if(metalName.includes('18K')) karatFactor=18/24;
  
  const pricePerGram=(spotPerOz/(311034768/1e7))*karatFactor;
  const alloyCost=pricePerGram*weightScrap;
  
  const isCrushed=false; // simplified
  const printing=isCrushed?60:120;
  const castLabor=isCrushed?10:20;
  const desprue=20;
  
  return(alloyCost+printing+castLabor)*2+desprue;
}

function calcPreciousSleeveCost(metalName, ringWidthMm, ringSize){
  const dia=ringSize*0.8128+11.63;
  const circ=Math.PI*dia;
  const sleeveThickness=0.75;
  const vol=(circ/10)*(ringWidthMm/10)*(sleeveThickness/10);
  let density=(0x51B/0x64);
  if(metalName.includes('Platinum')) density=(0x861/0x64);
  else if(metalName.includes('Silver')) density=(0x419/0x64);
  const weight=vol*density;
  const weightScrap=weight*1.05;
  if(!state.spotPrices) return 0; // pricing not loaded yet
  let spotPerOz=state.spotPrices.Gold;
  let karatFactor=1;
  if(metalName.includes('Platinum')){spotPerOz=state.spotPrices.Platinum;karatFactor=1;}
  else if(metalName.includes('Silver')){spotPerOz=state.spotPrices.Silver;karatFactor=1;}
  else if(metalName.includes('10K')) karatFactor=10/24;
  else if(metalName.includes('14K')) karatFactor=14/24;
  else if(metalName.includes('18K')) karatFactor=18/24;
  const pricePerGram=(spotPerOz/(311034768/1e7))*karatFactor;
  const alloyCost=pricePerGram*weightScrap;
  const printing=120;
  const castLabor=20;
  const desprue=20;
  return(alloyCost+printing+castLabor)*2+desprue;
}

function calcPinstripePrice(metalName, widthMm, ringSize, qty, isInlay){
  // Both pinstripes and inlays use outer-surface diameter (matches Excel pinstripe calculator)
  const dia=22.1964+2.54*0.1016*(ringSize-13);
  const circ=Math.PI*dia;
  const depth=DATA.f.pinstripe_depth_mm||1.75;
  const vol=(widthMm*depth*circ*qty)/1000;
  let density=(0x51B/0x64);
  if(metalName.includes('Platinum')) density=(0x861/0x64);
  else if(metalName.includes('Silver')) density=(0x419/0x64);
  const weight=vol*density;
  const weightScrap=weight*1.05;
  
  if(!state.spotPrices) return 0; // pricing not loaded yet
  let spotPerOz=state.spotPrices.Gold;
  let karatFactor=1;
  if(metalName.includes('Platinum')){spotPerOz=state.spotPrices.Platinum;karatFactor=1;}
  else if(metalName.includes('Silver')){spotPerOz=state.spotPrices.Silver;karatFactor=1;}
  else if(metalName.includes('10K')) karatFactor=10/24;
  else if(metalName.includes('14K')) karatFactor=14/24;
  else if(metalName.includes('18K')) karatFactor=18/24;
  
  const pricePerGram=(spotPerOz/(311034768/1e7))*karatFactor;
  const matCost=pricePerGram*weightScrap;
  return(matCost+50)*2;
}

function getInlayPrice(materialName, widthMm){
  // Check width-based pricing first
  if(DATA.pm[materialName]){
    const prices=DATA.pm[materialName];
    let closest=prices[0];
    for(const[mm,price]of prices){
      if(mm<=widthMm) closest=[mm,price];
      else break;
    }
    return closest[1]||0;
  }
  
  // Check meteorite pricing
  if(materialName.includes('Meteorite')||materialName.includes('Gibeon')){
    const mp=DATA.mp.filter(r=>r.m===materialName);
    if(mp.length){
      let closest=mp[0];
      for(const r of mp){
        if(r.w<=widthMm) closest=r;
        else break;
      }
      return closest.mm||closest.pt||0;
    }
  }
  
  // Check mokume pricing
  if(materialName==='Metal Mokume'&&DATA.p[materialName]&&DATA.p[materialName].per_mm_inlay){
    return DATA.p[materialName].per_mm_inlay*widthMm;
  }
  if(materialName.includes('Mokume')&&!materialName.includes('Metal')){
    let closest=DATA.mk[0];
    for(const[mm,price]of DATA.mk){
      if(mm<=widthMm) closest=[mm,price];
      else break;
    }
    return closest[1]||0;
  }
  
  // Fixed pricing
  if(DATA.p[materialName]){
    return DATA.p[materialName].fixed_price||0;
  }
  
  return 0;
}

async function fetchSpotPrices(){
  const showError=(msg)=>{
    console.error('%c❌ Spot prices failed: '+msg,'color:#c0392b;font-weight:bold');
    const banner=document.getElementById('pricing-error-banner');
    if(banner) return; // already shown
