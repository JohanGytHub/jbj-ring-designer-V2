    document.querySelector('.main-content').prepend(errorDiv);
  };

  // Initialize spotPrices if null
  if(!state.spotPrices) state.spotPrices={Gold:0,Platinum:0,Silver:0};

  // Primary: Cloudflare Worker proxy
  try{
    const res=await fetch('https://jbj-spot-prices.johan-475.workers.dev/');
    if(res.ok){
      const d=await res.json();
      if(d.error){
        showError('KV pricing unavailable: '+d.error);
        return;
      }
      if(d.gold||d.platinum||d.silver){
        // Validate spot prices are in reasonable range before accepting
        if(d.gold>500&&d.gold<15000) state.spotPrices.Gold=d.gold;
        if(d.platinum>300&&d.platinum<5000) state.spotPrices.Platinum=d.platinum;
        if(d.silver>10&&d.silver<200) state.spotPrices.Silver=d.silver;
        
        // Check that we got at least one valid price
        if(state.spotPrices.Gold>0||state.spotPrices.Platinum>0||state.spotPrices.Silver>0){
          state.spotsLoaded=true;
          console.log('%c✅ Spot prices loaded from: CF Worker (KV)','color:#4a7c59;font-weight:bold');
          console.log('   Source API: '+(d.source||'unknown')+' | Gold: $'+state.spotPrices.Gold+'/oz | Platinum: $'+state.spotPrices.Platinum+'/oz | Silver: $'+state.spotPrices.Silver+'/oz');
          updatePrice();
          return;
        }
      }
    } else if(res.status===503){
      const errorData=await res.json().catch(()=>({}));
      showError(errorData.error||'Service temporarily unavailable');
      return;
    }
  }catch(e){
    console.warn('CF spot worker failed:',e);
  }

  // Retry after 2 seconds
  try{
    await new Promise(resolve=>setTimeout(resolve,2000));
    const res=await fetch('https://jbj-spot-prices.johan-475.workers.dev/');
    if(res.ok){
      const d=await res.json();
      if(d.gold||d.platinum||d.silver){
        if(d.gold>500&&d.gold<15000) state.spotPrices.Gold=d.gold;
        if(d.platinum>300&&d.platinum<5000) state.spotPrices.Platinum=d.platinum;
        if(d.silver>10&&d.silver<200) state.spotPrices.Silver=d.silver;
        
        if(state.spotPrices.Gold>0||state.spotPrices.Platinum>0||state.spotPrices.Silver>0){
          state.spotsLoaded=true;
          console.log('%c✅ Spot prices loaded from: CF Worker (retry)','color:#4a7c59;font-weight:bold');
          updatePrice();
          return;
        }
      }
    }
  }catch(e2){
    console.warn('CF spot worker retry failed:',e2);
  }
  
  // All failed — show error banner, disable submission
  showError('Unable to load current precious metal prices');
}

// ── 3D RING RENDERER (Canvas) ──
function getThemeVar(name){
  return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

// 3D rotation helper
function rot3D(x,y,z,eRad,aRad){
  const ce=Math.cos(eRad),se=Math.sin(eRad);
  const ca=Math.cos(aRad),sa=Math.sin(aRad);
  const y1=y*ce-z*se, z1=y*se+z*ce;
  return{x:x*ca+z1*sa, y:y1, z:-x*sa+z1*ca};
}

// Adjust hex color brightness
function adjBright(hex,b){
  if(!hex||hex.charAt(0)!=='#')return hex||'#888';
  const n=parseInt(hex.slice(1),16);
  let r=(n>>16)&255, g=(n>>8)&255, bl=n&255;
  r=Math.min(255,Math.max(0,Math.round(r*b)));
  g=Math.min(255,Math.max(0,Math.round(g*b)));
  bl=Math.min(255,Math.max(0,Math.round(bl*b)));
  return`rgb(${r},${g},${bl})`;
}

// Phase 2 — metallic shading: brightness + specular blend toward white
function shadeMetal(hex,b,s){
  if(!hex||hex.charAt(0)!=='#')return hex||'#888';
  const n=parseInt(hex.slice(1),16);
  let r=((n>>16)&255)*b, g=((n>>8)&255)*b, bl=(n&255)*b;
  if(s>0){const k=Math.min(1,s);r+=(255-r)*k;g+=(255-g)*k;bl+=(255-bl)*k;}
  return`rgb(${Math.min(255,Math.max(0,Math.round(r)))},${Math.min(255,Math.max(0,Math.round(g)))},${Math.min(255,Math.max(0,Math.round(bl)))})`;
}

// Phase 3 — photo-sampled material shading: map brightness onto real tones from product photos
function rampShade(rp,b,s){
  // rp = [shadow, mid, highlight, gloss] RGB arrays; b normalized against renderer's brightness range
  let t=(b-0.3)/(1.15-0.3); t=Math.max(0,Math.min(1,t));
  let c1,c2,f;
  if(t<0.5){c1=rp[0];c2=rp[1];f=t*2;} else {c1=rp[1];c2=rp[2];f=(t-0.5)*2;}
  let r=c1[0]+(c2[0]-c1[0])*f, g=c1[1]+(c2[1]-c1[1])*f, bl=c1[2]+(c2[2]-c1[2])*f;
  if(s>0){const k=Math.min(1,s);r+=(rp[3][0]-r)*k;g+=(rp[3][1]-g)*k;bl+=(rp[3][2]-bl)*k;}
  return`rgb(${Math.round(r)},${Math.round(g)},${Math.round(bl)})`;
}
// Shade by material: photo ramp when available (base metals), else legacy hex shading
function shadeMat(mat,hex,b,s){
  const rp=(typeof METAL_SHADE_RAMPS!=='undefined')?METAL_SHADE_RAMPS[mat]:null;
  return rp?rampShade(rp,b,s):shadeMetal(hex,b,s);
}

// Phase 3 — band-face textures for patterned metals (e.g. Damascus), built from product photos.
// Returns {canvas,w,tileH,period} once loaded; null before load or when the metal has no texture.
// The tile is mirror-stacked so it wraps seamlessly around the ring; canvas holds two full
// periods so any single quad's texture span never crosses the canvas edge.
const _metalTexCache={};
function getMetalTexture(mat){
  const src=(typeof METAL_TEXTURES!=='undefined')?METAL_TEXTURES[mat]:null;
  if(!src)return null;
  let e=_metalTexCache[mat];
  if(e===undefined){
    e=_metalTexCache[mat]={ready:false};
    const img=new Image();
    img.onload=()=>{
      const w=img.width, th=img.height, period=th*2;
      const c=document.createElement('canvas');
      c.width=w; c.height=period*2;
      const g=c.getContext('2d');
      for(let rep=0;rep<2;rep++){
        g.drawImage(img,0,rep*period);
        g.save(); g.translate(0,rep*period+period); g.scale(1,-1); g.drawImage(img,0,0); g.restore();
      }
      e.canvas=c; e.w=w; e.tileH=th; e.period=period; e.ready=true;
      try{renderRing();}catch(_){}
    };
    img.src='data:image/jpeg;base64,'+src;
  }
  return e.ready?e:null;
}

// Phase 2 — specular character per finish (sharpness + strength of the glint)
function finishSpec(f){
  switch(f){
    case 'Polished':return{pow:30,str:0.95};
    case 'Brushed':return{pow:8,str:0.55};
    case 'Matte':return{pow:5,str:0.3};
    case 'Sandblasted':return{pow:4,str:0.2};
    case 'Frost':return{pow:4,str:0.22};
    case 'Deep Frost':return{pow:4,str:0.16};
    case 'Hammer':return{pow:14,str:0.75};
    default:return{pow:22,str:0.72};
  }
}

// Build strip layout as fractional positions
function buildStripLayout(){
  const layout=[];
  const tw=state.ringWidth;
  if(!tw)return[{s:0,e:1,color:getColor(state.baseMetal)||'#888',mat:state.baseMetal}];
  if(state.strips.length===0){
    return[{s:0,e:1,color:getColor(state.baseMetal)||'#888',mat:state.baseMetal}];
  }
  let used=0;
  for(const st of state.strips){
    layout.push({s:used/tw,e:(used+st.width)/tw,color:getColor(st.material),mat:st.material});
    used+=st.width;
  }
  if(used<tw-0.01){
    layout.push({s:used/tw,e:1,color:getColor(state.baseMetal)||'#888',mat:state.baseMetal});
  }
  return layout;
}

// Profile shape: outer surface offset at normalized position t (0=first edge, 1=last edge)
function profOuterOff(profile,t,thick){
  const u=t*2-1; // -1 to 1
  const u2=u*u;
  switch(profile){
    case 'Round':case 'Dome':case 'D-Shape':case 'Half Round':
      return(1-u2)*thick*0.5;
    case 'Half Dome':
      return(1-u2)*thick*0.3;
    case 'Comfort Fit':
      return(1-u2)*thick*0.18;
    case 'Bevel':case 'Beveled':{
      const a=Math.abs(u);
      return a>0.6?-(a-0.6)/0.4*thick*0.4:0;
    }
    case 'Knife':case 'Knife Edge':
      return(1-Math.abs(u))*thick*0.6;
    case 'Tension':
      return(1-u2)*thick*0.22;
    case 'Concave':case 'Concave Center':
      return-(1-u2)*thick*0.35;
    case 'Convex':
      return(1-u2)*thick*0.4;
    case 'Euro Shank':
      return(1-u2)*thick*0.35;
    case 'Angular':
      return(1-Math.abs(u))*thick*0.35;
    case 'Wavy':
      return Math.sin(u*Math.PI*2)*thick*0.18;
    case 'Mobius':
      return Math.sin(u*Math.PI)*thick*0.3;
    case 'Concave Edge':{
      const a=Math.abs(u);
      return a>0.5?-(a-0.5)/0.5*thick*0.3:0;
    }
    case 'Domed Edge Large':case 'Domed Edge Small':{
      const a=Math.abs(u);
      const sz=profile.includes('Large')?0.4:0.25;
      return a>0.55?(1-((a-0.55)/0.45))*thick*sz:thick*sz;
    }
    case 'Flat Edge Dome High':
      return(1-u2)*thick*0.38;
    case 'Flat Edge Dome Low':
      return(1-u2)*thick*0.2;
    case 'Radius Edge Dome':
      return(1-u2)*thick*0.32;
    case 'Radius Edge Flat':{
      const a=Math.abs(u);
      return a>0.7?-(a-0.7)/0.3*thick*0.2:0;
    }
    case 'Grooved Edge Dome':case 'Grooved Edge Knife':{
      const base=profile.includes('Knife')?(1-Math.abs(u))*thick*0.35:(1-u2)*thick*0.3;
      const a=Math.abs(u);
      const groove=a>0.55&&a<0.75?-thick*0.12*Math.sin((a-0.55)/0.2*Math.PI):0;
      return base+groove;
    }
    case 'Double Grooved Knife High':case 'Double Grooved Knife Low':{
      const base=(1-Math.abs(u))*thick*(profile.includes('High')?0.45:0.3);
      const a=Math.abs(u);
      const g1=a>0.3&&a<0.5?-thick*0.1*Math.sin((a-0.3)/0.2*Math.PI):0;
      const g2=a>0.6&&a<0.8?-thick*0.1*Math.sin((a-0.6)/0.2*Math.PI):0;
      return base+g1+g2;
    }
    case 'Faceted':{
      // Multi-faceted: create angular facets
      const a=Math.abs(u);
      if(a<0.33)return thick*0.35;
      if(a<0.66)return thick*0.35-(a-0.33)/0.33*thick*0.15;
      return thick*0.2-(a-0.66)/0.34*thick*0.2;
    }
    case 'Stepped Edges':{
      const a=Math.abs(u);
      if(a<0.4)return thick*0.2;
      if(a<0.45)return thick*0.2-(a-0.4)/0.05*thick*0.2;
      return 0;
    }
    case 'Signet':
      return u<0?(1-u2)*thick*0.15:Math.max(0,(1-u*1.3))*thick*0.4;
    case 'Barrel':
      return(1-u2)*thick*0.45;
    case 'Pipe Cut':case 'Square':case 'Flat':
    default:
      return 0;
  }
}

// Inner surface offset at normalized position t (positive = radius increases = comfort rounding)
function profInnerOff(profile,t,thick){
  const u=t*2-1;
  const u2=u*u;
  // Smooth edge rounding for ALL profiles — rings always have comfort-fit inner edges
  const a=Math.abs(u);
  // Start rounding at 45% from center, ramp up strongly toward edges
  const edgeR=a>0.45?((a-0.45)/0.55):0;
  const baseComfort=edgeR*edgeR*edgeR*thick*1.6; // cubic ramp for smooth but strong curve
  switch(profile){
    case 'Comfort Fit':case 'Euro Shank':
      return(1-u2)*thick*0.25+baseComfort*1.2;
    case 'Round':case 'Dome':case 'D-Shape':case 'Half Round':case 'Barrel':
      return(1-u2)*thick*0.15+baseComfort;
    default:
      return baseComfort;
  }
}

// Setup mouse/touch interaction for 3D ring rotation
function setupRingInteraction(canvas){
  function onDown(x,y){ringView.isDragging=true;ringView.lastX=x;ringView.lastY=y;canvas.style.cursor='grabbing';ringView._hintShown=true;}
  function onMove(x,y){
    if(!ringView.isDragging)return;
    ringView.azimuth+=(x-ringView.lastX)*0.5;
    ringView.elevation=Math.max(0,Math.min(65,ringView.elevation-(y-ringView.lastY)*0.3));
    ringView.lastX=x;ringView.lastY=y;
    renderRing();
  }
  function onUp(){ringView.isDragging=false;canvas.style.cursor='grab';}
  canvas.addEventListener('mousedown',e=>{e.preventDefault();onDown(e.clientX,e.clientY);});
  window.addEventListener('mousemove',e=>{if(ringView.isDragging){e.preventDefault();onMove(e.clientX,e.clientY);}});
  window.addEventListener('mouseup',onUp);
  canvas.addEventListener('touchstart',e=>{if(e.touches.length===1)onDown(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  canvas.addEventListener('touchmove',e=>{if(ringView.isDragging&&e.touches.length===1){e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);}},{passive:false});
  canvas.addEventListener('touchend',onUp,{passive:true});
}

function renderRing(){
  const container=$('#ringPreview');
  
  // Create or reuse canvas
  let canvas=container.querySelector('canvas');
  if(!canvas){
    container.innerHTML='';
    canvas=document.createElement('canvas');
    canvas.style.maxWidth='100%';
    canvas.style.display='block';
    canvas.style.margin='0 auto';
    canvas.style.cursor='grab';
    container.appendChild(canvas);
    setupRingInteraction(canvas);
    ringView.canvas=canvas;
  }
  
  // Size canvas with devicePixelRatio for crisp rendering
  const dpr=Math.max(2, window.devicePixelRatio||1);
  const dispW=Math.min(container.offsetWidth||400, 480);
  const dispH=380;
  canvas.width=dispW*dpr;
  canvas.height=dispH*dpr;
  canvas.style.width=dispW+'px';
  canvas.style.height=dispH+'px';
  const ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,dispW,dispH);
  
  // Empty state
  if(!state.baseMetal){
    ctx.fillStyle=getThemeVar('--text-muted')||'#999';
    ctx.font='12px "DM Sans",sans-serif';
    ctx.textAlign='center';
    ctx.fillText('Select a base metal to begin',dispW/2,dispH/2);
    updateRingExtras();
    return;
  }
  
  const cx=dispW/2, cy=dispH/2;
  
  // Ring geometry — real proportions (diameter scales with size, width with width)
  const rSz=state.ringSize||10;
  const innerDiam=rSz*0.8128+11.63;               // mm inner diameter from sizing formula
  const wallT=2.1;                                 // mm wall thickness (ring_thickness_mm)
  const outerDiam=innerDiam+2*wallT;               // mm outer diameter
  // Fixed px/mm scale: size 10 ring fills canvas, other sizes proportional
  const refOuter=10*0.8128+11.63+2*2.1;            // 23.956mm (size 10 outer diam)
  const pxMm=Math.min(dispW*0.36,155)/(refOuter/2);// ~12.94 px per mm
  const outerR=(outerDiam/2)*pxMm;
  const innerR=(innerDiam/2)*pxMm;
  const majorR=(outerR+innerR)/2;
  const thick=outerR-innerR;                       // wallT * pxMm
  const ringWPx=state.ringWidth*pxMm;              // face width in px
  
  // Camera — remap elevation so 0° = face-on (ring upright as a circle)
  // and increasing elevation tilts the ring forward for 3D perspective
  const eRad=(ringView.elevation-90)*Math.PI/180;
  const aRad=ringView.azimuth*Math.PI/180;
  
  // Strip layout
  const stripLayout=buildStripLayout();
  const sleeveColor=getColor(state.sleeve||state.baseMetal)||'#888';
  const prof=state.profile||'Flat';
  const isFlat=prof==='Flat';
  
  // Build vertical slices: Flat profiles use strip boundaries directly;
  // non-Flat profiles always subdivide so profile curvature renders smoothly
  const vSlices=[];
  if(isFlat){
    for(const sl of stripLayout) vSlices.push({s:sl.s,e:sl.e,color:sl.color,mat:sl.mat});
  } else {
    const NV=36;
    for(let j=0;j<NV;j++){
      const s=j/NV, e=(j+1)/NV, mid=(s+e)/2;
      let col=getColor(state.baseMetal),vm=state.baseMetal;
      for(const sl of stripLayout){if(mid>=sl.s&&mid<sl.e){col=sl.color;vm=sl.mat;break;}}
      vSlices.push({s,e,color:col,mat:vm});
    }
  }
  
  // ── Phase 2: metallic specular setup ──
  const Hn={x:0.168,y:0.234,z:0.957};            // half-vector of light dir (0.25,0.35,0.65) and view dir (0,0,1)
  const Hn2={x:-0.305,y:-0.122,z:0.945};         // rim light from lower-left — counter-glint so metal reads from any angle
  const fSpec=finishSpec(state.finish);
  const isHammer=(state.finish==='Hammer');
  const specFor=(mat)=>isMetalGroup(mat)?1:0.3;  // non-metal inlays get a satin sheen only
  const topMat=stripLayout.length>0?stripLayout[0].mat:state.baseMetal;
  const botMat=stripLayout.length>0?stripLayout[stripLayout.length-1].mat:state.baseMetal;
  const sleeveMat=state.sleeve||state.baseMetal;

  // Generate quads (polygons) for painter's algorithm
  const quads=[];
  const NS=128; // segments around ring
  
  // Per-segment outer-face lighting — normal direction depends only on angle, so precompute once
  const segBr=new Array(NS+1), segSp=new Array(NS+1);
  for(let k=0;k<=NS;k++){
    const t=((k%NS)/NS)*2*Math.PI;
    const n=rot3D(Math.sin(t),0,Math.cos(t),eRad,aRad);
    const nl=Math.sqrt(n.x*n.x+n.y*n.y+n.z*n.z)||1;
    const nx=n.x/nl,ny=n.y/nl,nz=n.z/nl;
    const ld=nx*0.25+ny*0.35+nz*0.65;
    segBr[k]=Math.max(0.28,Math.min(1.2,0.5+ld*0.72));
    let sp=Math.max(0,nx*Hn.x+ny*Hn.y+nz*Hn.z);
    const sp2=Math.max(0,nx*Hn2.x+ny*Hn2.y+nz*Hn2.z);
    segSp[k]=fSpec.str*(Math.pow(sp,fSpec.pow)+0.3*Math.pow(sp2,fSpec.pow));
  }
  // Smooth circumferential gradients on the outer face (kills banding). Hammer keeps flat
  // facets for its sparkle; very high quad counts (curved profiles) keep flat fill for speed.
  const useGrad=!isHammer && (NS*vSlices.length)<=1600;
  
  // Integer texture repeats around the circumference per textured material (seamless wrap)
  const _texReps={};
  const texRepeats=(tex)=>{
    const key=tex.w+'x'+tex.tileH;
    if(_texReps[key]===undefined){
      const periodMM=2*(tex.tileH/tex.w)*state.ringWidth; // mirrored period length on the band
      _texReps[key]=Math.max(1,Math.round((Math.PI*outerDiam)/periodMM));
    }
    return _texReps[key];
  };
  
  for(let i=0;i<NS;i++){
    const t1=(i/NS)*2*Math.PI;
    const t2=((i+1)/NS)*2*Math.PI;
    const tM=(t1+t2)/2;
    const sinT1=Math.sin(t1),cosT1=Math.cos(t1);
    const sinT2=Math.sin(t2),cosT2=Math.cos(t2);
    
    // ── OUTER FACE ── (per vertical slice, profile-shaped)
    for(const sl of vSlices){
      const h1=ringWPx/2-sl.s*ringWPx;
      const h2=ringWPx/2-sl.e*ringWPx;
      // Profile-adjusted outer radius at top and bottom of this slice
      const or1=outerR+profOuterOff(prof,sl.s,thick);
      const or2=outerR+profOuterOff(prof,sl.e,thick);
      const pts=[
        rot3D(or1*sinT1,h1,or1*cosT1,eRad,aRad),
        rot3D(or1*sinT2,h1,or1*cosT2,eRad,aRad),
        rot3D(or2*sinT2,h2,or2*cosT2,eRad,aRad),
        rot3D(or2*sinT1,h2,or2*cosT1,eRad,aRad),
      ];
      const mat=sl.mat||state.baseMetal;
      const sf=specFor(mat);
      let s1=segSp[i]*sf, s2=segSp[i+1]*sf;
      if(isHammer){const jj=Math.sin(i*127.1+sl.s*311.7)*43758.5453;const jm=0.4+(jj-Math.floor(jj))*1.1;s1*=jm;s2*=jm;}
      const dp=(pts[0].z+pts[1].z+pts[2].z+pts[3].z)/4;
      const tex=useGrad?getMetalTexture(mat):null;
      if(tex){
        const R=texRepeats(tex);
        const ty1=((i/NS)*R*tex.period)%tex.period;
        const ty2=ty1+(R*tex.period)/NS;
        quads.push({p:pts,d:dp,t:'o',tex:tex.canvas,
          tuv:{tx1:sl.s*tex.w,tx2:sl.e*tex.w,ty1:ty1,ty2:ty2},
          ov:{x1:(pts[0].x+pts[3].x)/2, y1:(pts[0].y+pts[3].y)/2,
              x2:(pts[1].x+pts[2].x)/2, y2:(pts[1].y+pts[2].y)/2,
              d1:Math.max(0,Math.min(0.75,(1-segBr[i])*0.8)),
              d2:Math.max(0,Math.min(0.75,(1-segBr[i+1])*0.8)),
              w1:Math.max(0,Math.min(0.9,s1*0.85+Math.max(0,segBr[i]-1)*0.5)),
              w2:Math.max(0,Math.min(0.9,s2*0.85+Math.max(0,segBr[i+1]-1)*0.5))}});
      } else if(useGrad){
        quads.push({p:pts,d:dp,t:'o',g:{
          x1:(pts[0].x+pts[3].x)/2, y1:(pts[0].y+pts[3].y)/2,
          x2:(pts[1].x+pts[2].x)/2, y2:(pts[1].y+pts[2].y)/2,
          c1:shadeMat(mat,sl.color,segBr[i],s1), c2:shadeMat(mat,sl.color,segBr[i+1],s2)}});
      } else {
        quads.push({p:pts,c:sl.color,m:mat,b:(segBr[i]+segBr[i+1])/2,d:dp,t:'o',s:(s1+s2)/2});
      }
    }
    
    // ── INNER CONTOUR ── (replaces flat top/bottom edges + inner surface)
    // Generates a smooth curved contour: top edge curve → inner wall → bottom edge curve
    // This creates the comfort-fit rounded inner edges visible in profile cross-sections
    
    const NE=10; // subdivisions per edge curve
    const NIW=12; // subdivisions for inner wall
    const comfortR=thick*0.45; // radius of the edge rounding curve
    const topCol=stripLayout.length>0?stripLayout[0].color:getColor(state.baseMetal);
    const botCol=stripLayout.length>0?stripLayout[stripLayout.length-1].color:getColor(state.baseMetal);
    
    // Edge radii at top and bottom
    const orTop=outerR+profOuterOff(prof,1,thick);
    const orBot=outerR+profOuterOff(prof,0,thick);
    // Inner surface adjustment at the start of the straight wall
    const irMid=innerR; // base inner radius at mid-height
    
    // ── Top edge curve (outer face top → inner surface top) ──
    for(let j=0;j<NE;j++){
      const a1=(j/NE)*Math.PI/2;
      const a2=((j+1)/NE)*Math.PI/2;
      // Curve from (orTop, topH) to (irMid_adjusted, topH - comfortR)
      const r1=orTop-(orTop-irMid)*Math.sin(a1);
      const r2=orTop-(orTop-irMid)*Math.sin(a2);
      const h1=ringWPx/2-comfortR*(1-Math.cos(a1));
      const h2=ringWPx/2-comfortR*(1-Math.cos(a2));
      const ep=[
        rot3D(r1*sinT1,h1,r1*cosT1,eRad,aRad),
        rot3D(r1*sinT2,h1,r1*cosT2,eRad,aRad),
        rot3D(r2*sinT2,h2,r2*cosT2,eRad,aRad),
        rot3D(r2*sinT1,h2,r2*cosT1,eRad,aRad),
      ];
      // Normal blends from upward (top face) to inward (inner surface)
      const nAngle=(a1+a2)/2;
      const en=rot3D(-Math.sin(nAngle)*sinT1,Math.cos(nAngle),-Math.sin(nAngle)*cosT1,eRad,aRad);
      const eLd=en.x*0.2+en.y*0.45+en.z*0.5;
      const eBr=Math.max(0.35,Math.min(1.0,0.5+eLd*0.5));
      let eSp=Math.max(0,en.x*Hn.x+en.y*Hn.y+en.z*Hn.z);
      eSp=fSpec.str*0.8*Math.pow(eSp,fSpec.pow)*specFor(topMat);
      const eDp=(ep[0].z+ep[1].z+ep[2].z+ep[3].z)/4;
      quads.push({p:ep,c:topCol,m:topMat,b:eBr,d:eDp,t:'t',s:eSp});
    }
    
    // ── Inner wall (straight section with comfort-fit curve) ──
    const wallTop=ringWPx/2-comfortR;
    const wallBot=-ringWPx/2+comfortR;
    for(let j=0;j<NIW;j++){
      const t_s=j/NIW, t_e=(j+1)/NIW;
      // Map t to actual height along the straight wall portion
      const ih1=wallTop-(wallTop-wallBot)*t_s;
      const ih2=wallTop-(wallTop-wallBot)*t_e;
      // Map t to full ring position (0-1) for profInnerOff, accounting for the curved portions
      const fullT1=1-(comfortR/ringWPx)-(ih1-wallBot)/(ringWPx);
      const fullT2=1-(comfortR/ringWPx)-(ih2-wallBot)/(ringWPx);
      const ir1=innerR+profInnerOff(prof,1-fullT1,thick)*0.5;
      const ir2=innerR+profInnerOff(prof,1-fullT2,thick)*0.5;
      const iPts=[
        rot3D(ir1*sinT1,ih1,ir1*cosT1,eRad,aRad),
        rot3D(ir1*sinT2,ih1,ir1*cosT2,eRad,aRad),
        rot3D(ir2*sinT2,ih2,ir2*cosT2,eRad,aRad),
        rot3D(ir2*sinT1,ih2,ir2*cosT1,eRad,aRad),
      ];
      const iN=rot3D(-sinT1,0,-cosT1,eRad,aRad);
      const iLd=iN.x*0.2+iN.y*0.35+iN.z*0.5;
      const iBr=Math.max(0.38,Math.min(0.78,0.5+iLd*0.28));
      let iSp=Math.max(0,iN.x*Hn.x+iN.y*Hn.y+iN.z*Hn.z);
      iSp=fSpec.str*0.35*Math.pow(iSp,fSpec.pow)*specFor(sleeveMat);
      const iDp=(iPts[0].z+iPts[1].z+iPts[2].z+iPts[3].z)/4;
      quads.push({p:iPts,c:sleeveColor,m:sleeveMat,b:iBr,d:iDp,t:'i',s:iSp});
    }
    
    // ── Bottom edge curve (inner surface bottom → outer face bottom) ──
    for(let j=0;j<NE;j++){
      const a1=(j/NE)*Math.PI/2;
      const a2=((j+1)/NE)*Math.PI/2;
      // Curve from (irMid_adjusted, botH + comfortR) to (orBot, botH)
      const r1=irMid+(orBot-irMid)*Math.sin(a1);
      const r2=irMid+(orBot-irMid)*Math.sin(a2);
      const h1=-ringWPx/2+comfortR*(1-Math.sin(a1));
      const h2=-ringWPx/2+comfortR*(1-Math.sin(a2));
      const ep=[
        rot3D(r1*sinT1,h1,r1*cosT1,eRad,aRad),
        rot3D(r1*sinT2,h1,r1*cosT2,eRad,aRad),
        rot3D(r2*sinT2,h2,r2*cosT2,eRad,aRad),
        rot3D(r2*sinT1,h2,r2*cosT1,eRad,aRad),
      ];
      const nAngle=(a1+a2)/2;
      const en=rot3D(-Math.cos(nAngle)*sinT1,-Math.sin(nAngle),-Math.cos(nAngle)*cosT1,eRad,aRad);
      const eLd=en.x*0.2+en.y*0.3+en.z*0.4;
      const eBr=Math.max(0.3,Math.min(0.85,0.45+eLd*0.4));
      let eSp=Math.max(0,en.x*Hn.x+en.y*Hn.y+en.z*Hn.z);
      eSp=fSpec.str*0.8*Math.pow(eSp,fSpec.pow)*specFor(botMat);
      const eDp=(ep[0].z+ep[1].z+ep[2].z+ep[3].z)/4;
      quads.push({p:ep,c:botCol,m:botMat,b:eBr,d:eDp,t:'b',s:eSp});
    }
  }
  
  // Sort back-to-front (painter's algorithm)
  quads.sort((a,b)=>a.d-b.d);
  
  // ── Draw shadow ellipse beneath ring ──
  const shadowErad=ringView.elevation*Math.PI/180;
  const shadowRx=outerR+12;
  const shadowRy=Math.max(5,(outerR+12)*Math.sin(shadowErad)*0.28);
  const shadowCy=cy+ringWPx/2*Math.cos(shadowErad)+8;
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  ctx.save();
  ctx.translate(cx,shadowCy);
  ctx.scale(1,Math.max(0.02,shadowRy/shadowRx));
  const shGrad=ctx.createRadialGradient(0,0,0,0,0,shadowRx);
  shGrad.addColorStop(0,isDark?'rgba(0,0,0,0.55)':'rgba(28,24,14,0.26)');
  shGrad.addColorStop(0.45,isDark?'rgba(0,0,0,0.28)':'rgba(28,24,14,0.12)');
  shGrad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=shGrad;
  ctx.beginPath();
  ctx.arc(0,0,shadowRx,0,2*Math.PI);
  ctx.fill();
  ctx.restore();
  
  // ── Draw all quads ──
  for(const q of quads){
    if(q.tex){
      // Textured quad: clip slightly-inflated quad, affine-map the texture, overlay lighting
      const cxq=(q.p[0].x+q.p[1].x+q.p[2].x+q.p[3].x)/4;
      const cyq=(q.p[0].y+q.p[1].y+q.p[2].y+q.p[3].y)/4;
      ctx.save();
      ctx.beginPath();
      for(let j=0;j<4;j++){
        const ddx=q.p[j].x-cxq, ddy=q.p[j].y-cyq, ln=Math.sqrt(ddx*ddx+ddy*ddy)||1;
        const ex=q.p[j].x+ddx/ln*0.6, ey=q.p[j].y+ddy/ln*0.6; // 0.6px inflation seals seams
        if(j===0)ctx.moveTo(cx+ex,cy-ey); else ctx.lineTo(cx+ex,cy-ey);
      }
      ctx.closePath();
      ctx.clip();
      const T=q.tuv, du=T.tx2-T.tx1, dv=T.ty2-T.ty1;
      if(Math.abs(du)>1e-6&&Math.abs(dv)>1e-6){
        // Affine from 3 corners: p0=(tx1,ty1), p3=(tx2,ty1), p1=(tx1,ty2)
        const X0=cx+q.p[0].x, Y0=cy-q.p[0].y;
        const X1=cx+q.p[1].x, Y1=cy-q.p[1].y;
        const X3=cx+q.p[3].x, Y3=cy-q.p[3].y;
        const a=(X3-X0)/du, b=(Y3-Y0)/du, c=(X1-X0)/dv, d=(Y1-Y0)/dv;
        const e=X0-a*T.tx1-c*T.ty1, f=Y0-b*T.tx1-d*T.ty1;
        ctx.save();
        ctx.transform(a,b,c,d,e,f); // compose with DPR transform
        ctx.drawImage(q.tex,0,0);
        ctx.restore();
      }
      // Lighting overlays (shadow + highlight) on top of the texture
      const o=q.ov, odx=o.x2-o.x1, ody=o.y2-o.y1;
      ctx.beginPath();
      ctx.moveTo(cx+q.p[0].x, cy-q.p[0].y);
      for(let j=1;j<4;j++) ctx.lineTo(cx+q.p[j].x, cy-q.p[j].y);
      ctx.closePath();
      if(odx*odx+ody*ody>0.01){
        const gd=ctx.createLinearGradient(cx+o.x1,cy-o.y1,cx+o.x2,cy-o.y2);
        gd.addColorStop(0,'rgba(0,0,0,'+o.d1.toFixed(3)+')');
        gd.addColorStop(1,'rgba(0,0,0,'+o.d2.toFixed(3)+')');
        ctx.fillStyle=gd; ctx.fill();
        const gw=ctx.createLinearGradient(cx+o.x1,cy-o.y1,cx+o.x2,cy-o.y2);
        gw.addColorStop(0,'rgba(255,255,255,'+o.w1.toFixed(3)+')');
        gw.addColorStop(1,'rgba(255,255,255,'+o.w2.toFixed(3)+')');
        ctx.fillStyle=gw; ctx.fill();
      } else {
        ctx.fillStyle='rgba(0,0,0,'+((o.d1+o.d2)/2).toFixed(3)+')'; ctx.fill();
        ctx.fillStyle='rgba(255,255,255,'+((o.w1+o.w2)/2).toFixed(3)+')'; ctx.fill();
      }
      ctx.restore();
      continue;
    }
    ctx.beginPath();
    ctx.moveTo(cx+q.p[0].x, cy-q.p[0].y);
    for(let j=1;j<q.p.length;j++) ctx.lineTo(cx+q.p[j].x, cy-q.p[j].y);
    ctx.closePath();
    let fc;
    if(q.g){
      const dx=q.g.x2-q.g.x1, dy=q.g.y2-q.g.y1;
      if(dx*dx+dy*dy>0.01){
        fc=ctx.createLinearGradient(cx+q.g.x1,cy-q.g.y1,cx+q.g.x2,cy-q.g.y2);
        fc.addColorStop(0,q.g.c1);
        fc.addColorStop(1,q.g.c2);
      } else {
        fc=q.g.c1; // degenerate edge-on quad — flat fill
      }
    } else {
      fc=shadeMat(q.m||state.baseMetal,q.c,q.b,q.s||0);
    }
    ctx.fillStyle=fc;
    ctx.fill();
    // Stroke every quad with its own fill to seal sub-pixel gaps
    ctx.strokeStyle=fc;
    ctx.lineWidth=0.5;
    ctx.lineJoin='round';
    ctx.stroke();
  }
  
  // ── Drag hint ──
  if(!ringView._hintShown){
    ctx.save();
    ctx.fillStyle=isDark?'rgba(255,255,255,0.35)':'rgba(0,0,0,0.3)';
    ctx.font='10px "DM Sans",sans-serif';
    ctx.textAlign='center';
    ctx.fillText('↔ Drag to rotate',cx,dispH-8);
    ctx.restore();
  }
  
  updateRingExtras();
}

// Update specs, legend, profile display
function updateRingExtras(){
  const specs=$('#ringSpecs');
  if(specs){
    const parts=[];
    if(state.baseMetal) parts.push(`<span>Metal: <span class="val">${state.baseMetal}</span></span>`);
    parts.push(`<span>Width: <span class="val">${state.ringWidth}mm</span></span>`);
    parts.push(`<span>Profile: <span class="val">${state.profile}</span></span>`);
    if(state.strips.length) parts.push(`<span>Strips: <span class="val">${state.strips.length}</span></span>`);
    specs.innerHTML=parts.join('');
  }
  updateLegend();
  // Profile cross-section image
  const profDisp=$('#profileDisplay');
  const profImg=$('#profileImg');
  const profName=$('#profileName');
  if(profDisp && state.profile && typeof PROFILE_IMAGES!=='undefined' && PROFILE_IMAGES[state.profile]){
    profImg.src='data:image/png;base64,'+PROFILE_IMAGES[state.profile];
    profName.textContent=state.profile;
    profDisp.style.display='block';
  } else if(profDisp){
    profDisp.style.display='none';
  }
  // Show reset button when view has been rotated from default
  const resetWrap=$('#ringResetWrap');
  if(resetWrap){
    const isDefault=(ringView.elevation===0 && ringView.azimuth===90);
    resetWrap.style.display=isDefault?'none':'block';
  }
}

function updateLegend(){
  const legend=$('#stripLegend');
  if(!state.strips.length){legend.innerHTML='';return;}
  let html='';
  for(const s of state.strips){
    html+=`<div class="strip-legend-item"><div class="swatch" style="background:${getColor(s.material)}"></div>${s.material}</div>`;
  }
  legend.innerHTML=html;
}

// ── UPDATE PRICE DISPLAY ──
function updatePrice(){
  const el=$('#priceAmount');
  const elMobile=$('#priceAmountMobile');
  const result=calcPrice();
  const txt=(!result||result.total===0)?'—':'$'+result.total.toFixed(2);
  el.textContent=txt;
  if(elMobile) elMobile.textContent=txt;
  // Update mobile step info
  const stepInfo=$('#mobileStepInfo');
  if(stepInfo) stepInfo.textContent='Step '+(state.step+1)+' of '+STEPS.length+': '+STEPS[state.step].label;

// ── RENDER STEPS BAR ──
function renderStepsBar(){
  const bar=$('#stepsBar');
  bar.innerHTML='';
  STEPS.forEach((step,i)=>{
    const div=h('div',{class:'step-dot',style:{position:'relative'}},[
      h('div',{class:'tip'},[step.tip]),
      h('button',{
        class:'dot'+(i===state.step?' active':'')+(i<state.step?' done':''),
        title:step.label+': '+step.tip,
        onClick:()=>{if(i<=state.step){
          if(state.step===STEPS.length-1 && i<state.step && !state._quoteSubmitted && !(/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(state.email))){
            showExitEmailModal(()=>goToStep(i));
          } else { goToStep(i); }
        }}
      },[i<state.step?'✓':String(step.num)]),
      h('div',{class:'step-label'},[step.label]),
    ]);
    if(i<STEPS.length-1){
      div.appendChild(h('div',{class:'line'+(i<state.step?' done':'')}));
    }
    bar.appendChild(div);
  });
}

function goToStep(idx){
  // Skip Band Composer (index 3) if user chose no inlays
  if(idx===3 && !state.wantsInlays){
    idx=state.step<3?4:2;
  }
  // Auto-close ring with base metal edge when leaving compose step forward
  if(state.step===3 && idx>3 && state.strips.length>0){
    const usedWidth=state.strips.reduce((s,st)=>s+st.width,0);
    const remaining=state.ringWidth-usedWidth;
    if(remaining>0.01){
      pushUndo();
      state.strips.push({material:state.baseMetal,width:parseFloat(remaining.toFixed(2))});
      consolidateStrips();
    }
  }
  state.step=idx;
  // beforeunload guard on Step 7 (summary)
  if(idx===STEPS.length-1 && !state._quoteSubmitted){
    window.addEventListener('beforeunload',_exitGuard);
    document.addEventListener('mouseout',_exitIntentHandler);
    _exitIntentShown=false;
  } else {
    window.removeEventListener('beforeunload',_exitGuard);
    document.removeEventListener('mouseout',_exitIntentHandler);
  }
  renderStepsBar();
  renderPanel();
  renderRing();
  updatePrice();
}

function _getCanvasImage(){
  const c=document.querySelector('#ringPreview canvas');
  if(!c)return null;
  try{ return c.toDataURL('image/png').split(',')[1]; }catch(e){ return null; }
}

function _exitGuard(e){ if(!state._quoteSubmitted){ e.preventDefault(); e.returnValue=''; } }

let _exitIntentShown=false;
function _exitIntentHandler(e){
  if(e.clientY>0 || _exitIntentShown || state._quoteSubmitted) return;
  if(!(/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(state.email))){
    _exitIntentShown=true;
    showExitEmailModal(null);
  }
}

function showExitEmailModal(onDone){
  if(state._quoteSubmitted) return; // Prevent duplicate submission
  const isValid=(e)=>/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(e);
  const overlay=document.createElement('div');
  overlay.className='exit-overlay';
  overlay.innerHTML=`<div class="exit-modal">
    <h3>Before you go...</h3>
    <p>Enter your email so we can send you a quote for this custom ring design.</p>
    <input type="email" placeholder="your@email.com" value="${state.email||''}" />
    <div class="exit-err">Please enter a valid email address.</div>
    <div class="exit-btns">
      <button class="btn-exit-skip">Leave without email</button>
      <button class="btn-exit-submit">Send my quote</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  const inp=overlay.querySelector('input');
  const err=overlay.querySelector('.exit-err');
  inp.focus();
  overlay.querySelector('.btn-exit-submit').onclick=async()=>{
    const email=inp.value.trim();
    if(!isValid(email)){ err.style.display='block'; inp.style.borderColor='#c0392b'; inp.focus(); return; }
    state.email=email;
    overlay.querySelector('.btn-exit-submit').textContent='Sending...';
    overlay.querySelector('.btn-exit-submit').disabled=true;
    // Fire the quote to the worker
    const result=calcPrice();
    const config={bm:state.baseMetal,w:state.ringWidth,p:state.profile,st:state.strips,sl:state.sleeve,f:state.finish,sz:state.ringSize,eng:state.engraving,wi:state.wantsInlays};
    const shareUrl=window.location.origin+window.location.pathname+'?design='+utoa(JSON.stringify(config));
    try{
      await fetch(QUOTE_WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
        email:state.email,notes:state.notes,baseMetal:state.baseMetal,ringSize:state.ringSize,ringWidth:state.ringWidth,
        profile:state.profile,sleeve:state.sleeve,finish:state.finish,engraving:state.engraving,
        strips:state.strips,breakdown:result?result.breakdown:[],total:result?result.total:0,spotPrices:state.spotPrices,shareUrl,
        ringImage:_getCanvasImage()
      })});
      state._quoteSubmitted=true;
      window.removeEventListener('beforeunload',_exitGuard);
      document.removeEventListener('mouseout',_exitIntentHandler);
    }catch(e){console.error(e);}
    overlay.remove();
    if(onDone)onDone();
  };
  overlay.querySelector('.btn-exit-skip').onclick=()=>{
    window.removeEventListener('beforeunload',_exitGuard);
    document.removeEventListener('mouseout',_exitIntentHandler);
    overlay.remove();
    if(onDone)onDone();
  };
}
