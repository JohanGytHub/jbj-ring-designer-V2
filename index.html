        if(state.strips.length>0){pushUndo();state.strips=[];undoStack.length=0;}
        state.selectedStrip=-1;
        renderWidthPanel(col);
        renderRing();
        updatePrice();
      }
    },[p.label+' ('+p.w+'mm)']));
  });
  col.appendChild(presetWrap);
  
  // ── Inlay toggle ──
  col.appendChild(h('h3',{style:{fontFamily:'var(--font-display)',fontWeight:'400',fontSize:'1rem',color:'var(--text-dim)',margin:'24px 0 6px'}},['Custom Inlays']));
  col.appendChild(h('p',{style:{fontSize:'.85rem',color:'var(--text-muted)',margin:'0 0 12px'}},['Add wood, meteorite, gemstone, antler, or other inlay materials to your ring? Inlays are set into the band on Flat or Round profiles.']));
  
  const toggleWrap=h('div',{style:{display:'flex',gap:'10px',marginBottom:'20px'}});
  const mkToggle=(label,val)=>{
    const isActive=state.wantsInlays===val;
    return h('button',{
      style:{flex:'1',padding:'10px 16px',borderRadius:'var(--radius)',border:isActive?'2px solid var(--gold)':'1px solid var(--border)',
        background:isActive?'var(--bg3)':'var(--bg2)',color:isActive?'var(--gold)':'var(--text-muted)',
        fontFamily:'var(--font-display)',fontSize:'.9rem',fontWeight:isActive?'500':'400',cursor:'pointer',transition:'var(--transition)'},
      onClick:()=>{
        const changed=state.wantsInlays!==val;
        state.wantsInlays=val;
        // If switching away from inlays, clear strips and allow any profile
        if(!val){state.strips=[];state.selectedStrip=-1;undoStack.length=0;}
        // If switching to inlays and current profile isn't inlay-compatible, reset to Flat
        if(val&&!INLAY_PROFILES.includes(state.profile)){state.profile='Flat';state.strips=[];state.selectedStrip=-1;undoStack.length=0;}
        renderWidthPanel(col);
        renderRing();
        updatePrice();
      }
    },[label]);
  };
  toggleWrap.appendChild(mkToggle('Yes, add inlays',true));
  toggleWrap.appendChild(mkToggle('No, base metal only',false));
  col.appendChild(toggleWrap);
  
  // Profile grid
  col.appendChild(h('h3',{style:{fontFamily:'var(--font-display)',fontWeight:'400',fontSize:'1rem',color:'var(--text-dim)',margin:'0 0 10px'}},['Profile']));
  
  const matData=state.baseMetal?DATA.m[state.baseMetal]:null;
  const allowedProfiles=matData?matData.p:PROFILES;
  // If user wants inlays, only show inlay-compatible profiles
  const visibleProfiles=state.wantsInlays?allowedProfiles.filter(p=>INLAY_PROFILES.includes(p)):allowedProfiles;
  
  if(state.wantsInlays){
    col.appendChild(h('p',{style:{fontSize:'.8rem',color:'var(--text-muted)',margin:'-4px 0 12px',fontStyle:'italic'}},['Showing Flat and Round profiles — inlays require a smooth surface.']));
  }
  
  const pg=h('div',{class:'profile-grid'});
  // Show common profiles first
  const commonProfiles=['Flat','Round','Tension','Bevel','Dome','Half Round','Knife Edge','Comfort Fit','Euro Shank','Wavy','Custom'];
  const shown=new Set();
  commonProfiles.forEach(p=>{
    if(!visibleProfiles.includes(p))return;
    shown.add(p);
    addProfileCard(pg, p, visibleProfiles);
  });
  // Add any remaining
  visibleProfiles.forEach(p=>{
    if(shown.has(p))return;
    addProfileCard(pg, p, visibleProfiles);
  });
  col.appendChild(pg);
  
  col.appendChild(navButtons(true, true));
}

function addProfileCard(container, profileName, allowed){
  const isAllowed=allowed.includes(profileName);
  const card=h('div',{
    class:'profile-card'+(state.profile===profileName?' selected':'')+(isAllowed?'':' disabled'),
    onClick:()=>{
      if(!isAllowed)return;
      state.profile=profileName;
      $$('.profile-card',container).forEach(c=>c.classList.remove('selected'));
      card.classList.add('selected');
      renderRing();
      updatePrice();
    }
  },[profileName]);
  container.appendChild(card);
}

// ── STEP 3: BAND COMPOSER ──
function consolidateStrips(){
  for(let i=0;i<state.strips.length-1;i++){
    if(state.strips[i].material===state.strips[i+1].material){
      state.strips[i].width=parseFloat((state.strips[i].width+state.strips[i+1].width).toFixed(2));
      state.strips.splice(i+1,1);
      if(state.selectedStrip>i) state.selectedStrip--;
      i--; // re-check same position in case 3+ adjacent
    }
  }
}

function updateCanvasUndoBtn(){
  const btn=document.getElementById('canvasUndoBtn');
  if(!btn) return;
  const onComposeStep=STEPS[state.step]&&STEPS[state.step].id==='compose';
  btn.style.display=(onComposeStep&&undoStack.length>0)?'inline-flex':'none';
}

function renderComposePanel(col){
  consolidateStrips();
  col.innerHTML='';
  col.appendChild(h('h2',{class:'panel-title'},['Build Your Band']));
  col.appendChild(h('p',{class:'panel-desc'},['Add inlay materials one at a time. '+state.baseMetal+' edges and pinstripes are inserted automatically between inlays. Any remaining width will be filled with a '+state.baseMetal+' edge when you continue.']));
  
  // ── Width control (adjustable while composing) ──
  const usedWidth=state.strips.reduce((s,st)=>s+st.width,0);
  const minW=Math.max(2, Math.ceil(usedWidth*2)/2); // snap up to nearest 0.5, floor 2mm
  
  const wc=h('div',{class:'width-control',style:{marginBottom:'14px'}});
  const wLabel=h('span',{style:{fontSize:'.85rem',color:'var(--text-dim)',fontFamily:'var(--font-display)',marginRight:'8px'}},['Ring Width']);
  const wInput=h('input',{type:'number',min:String(minW),max:'14',step:'0.5',value:String(state.ringWidth),
    style:{width:'60px',padding:'6px',background:'var(--input-bg)',border:'1px solid var(--border)',borderRadius:'var(--radius)',textAlign:'center',fontSize:'.9rem',color:'var(--gold)',fontFamily:'var(--font-display)',fontWeight:'500',outline:'none'},
    onChange:(e)=>{
      let v=parseFloat(e.target.value);
      if(isNaN(v)||v<minW)v=minW;if(v>14)v=14;
      v=Math.round(v*2)/2;
      if(v<minW)v=minW;
      state.ringWidth=v;
      renderComposePanel(col);
      renderRing();
      updatePrice();
    }
  });
  const wSlider=h('input',{type:'range',min:String(minW),max:'14',step:'0.5',value:String(state.ringWidth),
    onInput:(e)=>{
      let v=parseFloat(e.target.value);
      if(v<minW)v=minW;
      state.ringWidth=v;
      wInput.value=v;
      debounceSlider(()=>{renderComposePanel(col);renderRing();updatePrice();},50)();
    }
  });
  wc.appendChild(wLabel);
  wc.appendChild(h('span',{style:{fontSize:'.75rem',color:'var(--text-muted)'}},['2mm']));
  wc.appendChild(wSlider);
  wc.appendChild(h('span',{style:{fontSize:'.75rem',color:'var(--text-muted)'}},['14mm']));
  wc.appendChild(wInput);
  wc.appendChild(h('span',{style:{fontSize:'.75rem',color:'var(--text-muted)'}},['mm']));
  col.appendChild(wc);
  
  // Strip composer
  const remaining=state.ringWidth-usedWidth;
  const lastStrip=state.strips[state.strips.length-1];
  const lastIsInlay=lastStrip&&!isMetal(lastStrip.material);
  const bmMinW=getBaseMetalMinWidth();
  
  // Primary actions — at the top
  const actions=h('div',{class:'composer-actions',style:{marginBottom:'12px'}});
  actions.appendChild(h('button',{class:'btn btn-gold',disabled:remaining<=0,onClick:()=>{state.selectedStrip=-1;openAddStripModal();}},['+  Add Inlay']));
  
  // Clear all
  if(state.strips.length>0){
    actions.appendChild(h('button',{class:'btn btn-outline btn-sm',onClick:()=>{
      pushUndo();
      state.strips=[];
      state.selectedStrip=-1;
      renderComposePanel(col);
      renderRing();
      updatePrice();
    }},['Clear All']));
  }
  if(undoStack.length>0){
    const undoSvg='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>';
    const undoBtn=h('button',{class:'btn btn-outline btn-sm btn-undo',onClick:()=>undoAction()});
    undoBtn.innerHTML=undoSvg+' Undo';
    actions.appendChild(undoBtn);
  }
  col.appendChild(actions);
  
  // Remaining width
  col.appendChild(h('div',{class:'remaining-width'},[
    'Remaining: ',h('span',{class:'val'},[remaining.toFixed(2)+'mm']),
    ' of '+state.ringWidth+'mm'
  ]));
  
  if(_staffMode){
    const sip=h('div',{class:'staff-item-prices'});
    sip.appendChild(h('div',{class:'sip-title'},['Staff: Item Prices']));
    const _bmp=staffBaseMetalPrice(state.baseMetal,state.ringWidth);
    sip.appendChild(h('div',{class:'sip-row'},[h('span',{},[(state.baseMetal||'—')+' (Base Metal, '+state.ringWidth+'mm)']),h('span',{class:'p'},[staffFmtPrice(_bmp)])]));
    state.strips.forEach((st,ix)=>{
      if(st.material==='(choose)')return;
      sip.appendChild(h('div',{class:'sip-row'},[h('span',{},['Strip '+(ix+1)+': '+st.material+' ('+st.width+'mm)']),h('span',{class:'p'},[staffFmtPrice(staffStripPrice(st.material,st.width))])]));
    });
    col.appendChild(sip);
  }
  
  // Visual strip bar with drag-and-drop
  const composer=h('div',{class:'composer-strips'});
  // Click empty area of composer to deselect
  composer.addEventListener('click',(e)=>{
    if(e.target===composer && state.selectedStrip>=0){
      state.selectedStrip=-1;
      renderComposePanel(col);
    }
  });
  let dragSrcIdx=null;
  
  state.strips.forEach((s,i)=>{
    const widthPx=Math.max(28, s.width*30);
    const color=s.material==='(choose)'?'#444':getColor(s.material);
    const isSelected=state.selectedStrip===i;
    const lightBg=color.startsWith('#')&&isLightColor(color);
    const txtCol=lightBg?'rgba(0,0,0,.85)':'';
    const txtDimCol=lightBg?'rgba(0,0,0,.55)':'';
    const block=h('div',{
      class:'strip-block'+(isSelected?' active-selected':''),
      draggable:'true',
      style:{width:widthPx+'px',background:color,minWidth:widthPx+'px'},
      onClick:()=>{
        if(state.selectedStrip===i){
          // Already selected — open edit modal
          openEditStripModal(i);
        } else {
          // Select this strip
          state.selectedStrip=i;
          renderComposePanel(col);
        }
      }
    },[
      h('div',{class:'s-name',style:txtCol?{color:txtCol}:{}},[s.material==='(choose)'?'?':s.material.length>12?s.material.slice(0,10)+'…':s.material]),
      h('div',{class:'s-width',style:txtDimCol?{color:txtDimCol}:{}},[s.width+'mm']),
      h('button',{class:'s-remove',onClick:(e)=>{
        e.stopPropagation();
        pushUndo();
        state.strips.splice(i,1);
        state.selectedStrip=-1;
        renderComposePanel(col);
        renderRing();
        updatePrice();
      }},['×'])
    ]);
    
    if(_staffMode&&s.material!=='(choose)')block.title=s.material+' '+s.width+'mm: '+staffFmtPrice(staffStripPrice(s.material,s.width));
    
    // Drag events
    block.addEventListener('dragstart',(e)=>{
      dragSrcIdx=i;
      block.classList.add('dragging');
      composer.classList.add('drag-active');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',String(i));
      // Delay so the dragging class applies after the ghost image is captured
      setTimeout(()=>block.classList.add('dragging'),0);
    });
    
    block.addEventListener('dragend',()=>{
      block.classList.remove('dragging');
      composer.classList.remove('drag-active');
      $$('.strip-block',composer).forEach(b=>{
        b.classList.remove('drag-over-left','drag-over-right');
      });
      dragSrcIdx=null;
    });
    
    block.addEventListener('dragover',(e)=>{
      e.preventDefault();
      e.dataTransfer.dropEffect='move';
      if(dragSrcIdx===null||dragSrcIdx===i)return;
      // Determine if dropping left or right of this block
      const rect=block.getBoundingClientRect();
      const midX=rect.left+rect.width/2;
      $$('.strip-block',composer).forEach(b=>b.classList.remove('drag-over-left','drag-over-right'));
      if(e.clientX<midX){
        block.classList.add('drag-over-left');
      } else {
        block.classList.add('drag-over-right');
      }
    });
    
    block.addEventListener('dragleave',()=>{
      block.classList.remove('drag-over-left','drag-over-right');
    });
    
    block.addEventListener('drop',(e)=>{
      e.preventDefault();
      e.stopPropagation();
      if(dragSrcIdx===null||dragSrcIdx===i)return;
      
      // Determine drop position
      const rect=block.getBoundingClientRect();
      const midX=rect.left+rect.width/2;
      const dropBefore=e.clientX<midX;
      
      // Remove the dragged strip
      const savedStrips=state.strips.map(s=>({...s}));
      const moved=state.strips.splice(dragSrcIdx,1)[0];
      
      // Find the new index of the target (after removal shifted indices)
      let targetIdx=state.strips.indexOf(s);
      if(targetIdx===-1) targetIdx=i>dragSrcIdx?i-1:i;
      
      // Insert at the right position
      const newIdx=dropBefore?targetIdx:targetIdx+1;
      state.strips.splice(newIdx,0,moved);
      
      // Validate the proposed arrangement
      const ruleErr=validateProposedStrips(state.strips);
      if(ruleErr){
        state.strips=savedStrips;
        showRuleToast(ruleErr);
        dragSrcIdx=null;
        $$('.strip-block',composer).forEach(b=>b.classList.remove('drag-over-left','drag-over-right'));
        return;
      }
      undoStack.push({strips:savedStrips,selectedStrip:state.selectedStrip});

      dragSrcIdx=null;
      state.selectedStrip=-1;
      renderComposePanel(col);
      renderRing();
      updatePrice();
    });
    
    // Touch drag-and-drop for mobile
    let touchStartX=0,touchStartY=0,touchDragging=false,longPressTimer=null,touchClone=null;
    
    block.addEventListener('touchstart',(e)=>{
      const touch=e.touches[0];
      touchStartX=touch.clientX;
      touchStartY=touch.clientY;
      touchDragging=false;
      // Long press (300ms) initiates drag
      longPressTimer=setTimeout(()=>{
        touchDragging=true;
        dragSrcIdx=i;
        block.classList.add('dragging');
        composer.classList.add('drag-active');
        // Create visual clone
        touchClone=block.cloneNode(true);
        touchClone.style.cssText='position:fixed;z-index:200;opacity:0.8;pointer-events:none;transform:scale(1.1);box-shadow:0 4px 16px rgba(0,0,0,0.3);'+
          'width:'+block.offsetWidth+'px;height:'+block.offsetHeight+'px;background:'+getColor(s.material)+';'+
          'border-radius:4px;display:flex;align-items:center;justify-content:center;';
        document.body.appendChild(touchClone);
        touchClone.style.left=(touch.clientX-block.offsetWidth/2)+'px';
        touchClone.style.top=(touch.clientY-block.offsetHeight/2)+'px';
        // Haptic feedback if available
        if(navigator.vibrate) navigator.vibrate(30);
      },300);
    },{passive:true});
    
    block.addEventListener('touchmove',(e)=>{
      const touch=e.touches[0];
      const dx=Math.abs(touch.clientX-touchStartX);
      const dy=Math.abs(touch.clientY-touchStartY);
      
      // Cancel long press if moved before it triggers
      if(!touchDragging && (dx>8||dy>8)){
        clearTimeout(longPressTimer);
        return;
      }
      
      if(!touchDragging) return;
      e.preventDefault();
      
      // Move clone
      if(touchClone){
        touchClone.style.left=(touch.clientX-block.offsetWidth/2)+'px';
        touchClone.style.top=(touch.clientY-block.offsetHeight/2)+'px';
      }
      
      // Find target strip under finger
      if(touchClone) touchClone.style.display='none';
      const target=document.elementFromPoint(touch.clientX,touch.clientY);
      if(touchClone) touchClone.style.display='';
      
      $$('.strip-block',composer).forEach(b=>b.classList.remove('drag-over-left','drag-over-right'));
      const targetBlock=target?target.closest('.strip-block'):null;
      if(targetBlock && targetBlock!==block){
        const rect=targetBlock.getBoundingClientRect();
        const midX=rect.left+rect.width/2;
        if(touch.clientX<midX) targetBlock.classList.add('drag-over-left');
        else targetBlock.classList.add('drag-over-right');
      }
    },{passive:false});
    
    block.addEventListener('touchend',(e)=>{
      clearTimeout(longPressTimer);
      
      if(touchDragging){
        // Find drop target
        const touch=e.changedTouches[0];
        if(touchClone) touchClone.style.display='none';
        const target=document.elementFromPoint(touch.clientX,touch.clientY);
        if(touchClone){touchClone.remove();touchClone=null;}
        
        const targetBlock=target?target.closest('.strip-block'):null;
        if(targetBlock && targetBlock!==block){
          const blocks=$$('.strip-block',composer);
          const targetIdx=blocks.indexOf(targetBlock);
          if(targetIdx>=0 && dragSrcIdx!==null){
            const rect=targetBlock.getBoundingClientRect();
            const midX=rect.left+rect.width/2;
            const dropBefore=touch.clientX<midX;
            
            const savedStrips=state.strips.map(ss=>({...ss}));
            const moved=state.strips.splice(dragSrcIdx,1)[0];
            let newTargetIdx=targetIdx>dragSrcIdx?targetIdx-1:targetIdx;
            const newIdx=dropBefore?newTargetIdx:newTargetIdx+1;
            state.strips.splice(newIdx,0,moved);
            
            // Validate the proposed arrangement
            const ruleErr=validateProposedStrips(state.strips);
            if(ruleErr){
              state.strips=savedStrips;
              showRuleToast(ruleErr);
            } else {
              undoStack.push({strips:savedStrips,selectedStrip:state.selectedStrip});
            }
          }
        }
        
        block.classList.remove('dragging');
        composer.classList.remove('drag-active');
        $$('.strip-block',composer).forEach(b=>b.classList.remove('drag-over-left','drag-over-right'));
        dragSrcIdx=null;
        touchDragging=false;
        
        state.selectedStrip=-1;
        renderComposePanel(col);
        renderRing();
        updatePrice();
        return; // Don't trigger click/edit
      }
      
      touchDragging=false;
    },{passive:true});
    
    composer.appendChild(block);
  });
  
  // Show remaining space filled with the base metal (it auto-closes with a base metal edge on Continue)
  if(state.strips.length>0 && remaining>0.01){
    const ghostPx=Math.max(28, remaining*30);
    const bmColor=getColor(state.baseMetal);
    const bmLight=bmColor.startsWith('#')&&isLightColor(bmColor);
    const bmTxt=bmLight?'rgba(0,0,0,.85)':'rgba(255,255,255,.92)';
    const bmTxtDim=bmLight?'rgba(0,0,0,.55)':'rgba(255,255,255,.68)';
    composer.appendChild(h('div',{
      title:'Remaining width \u2014 filled with '+state.baseMetal+'. Click to add an inlay here.',
      style:{width:ghostPx+'px',minWidth:ghostPx+'px',background:bmColor,border:'1.5px dashed '+bmTxtDim,borderRadius:'5px',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',opacity:'0.9',cursor:'pointer',padding:'4px 2px',boxShadow:'var(--shadow-sm)'},
      onClick:()=>{state.selectedStrip=-1;openAddStripModal();}
    },[
      h('div',{style:{fontSize:'.52rem',color:bmTxt,writingMode:'vertical-rl',textOrientation:'mixed',lineHeight:'1',maxHeight:'50px',overflow:'hidden'}},
        [state.baseMetal.length>12?state.baseMetal.slice(0,10)+'\u2026':state.baseMetal]),
      h('div',{style:{fontSize:'.57rem',color:bmTxtDim,marginTop:'2px'}},
        [remaining.toFixed(1)+'mm']),
    ]));
  }
  
  if(state.strips.length===0){
    composer.appendChild(h('div',{style:{color:'var(--text-muted)',fontSize:'.75rem',padding:'16px',width:'100%',textAlign:'center'}},['No strips yet. Click "+ Add Inlay" above to start building your ring.']));
  }
  col.appendChild(composer);
  
  // Selected strip controls: slide arrows + edit button
  if(state.selectedStrip>=0 && state.selectedStrip<state.strips.length){
    const si=state.selectedStrip;
    const selStrip=state.strips[si];
    const isInlay=!isMetal(selStrip.material);
    
    // Determine if this inlay can slide left or right
    // Move LEFT = shrink metal on left, grow metal on right
    // Move RIGHT = shrink metal on right, grow metal on left
    const leftNeighbor=si>0?state.strips[si-1]:null;
    const rightNeighbor=si<state.strips.length-1?state.strips[si+1]:null;
    const leftIsMetal=leftNeighbor&&isMetal(leftNeighbor.material);
    const rightIsMetal=rightNeighbor&&isMetal(rightNeighbor.material);
    const canSlideLeft=isInlay&&leftIsMetal&&leftNeighbor.width>0;
    const canSlideRight=isInlay&&((rightIsMetal&&rightNeighbor.width>0)||(!rightNeighbor&&remaining>0));
    const step=0.25;
    
    const controls=h('div',{class:'strip-arrows'});
    
    if(canSlideLeft){
      // When creating a new metal strip on right, need at least bmMinW
      const slideNeedsNewRight=!rightIsMetal;
      const effectiveStep=slideNeedsNewRight?Math.max(step,bmMinW):step;
      const inlayNeedsEdges=needsMetalEdges(selStrip.material);
      const canAfford=leftNeighbor.width>=effectiveStep||(leftNeighbor.width>=step&&!slideNeedsNewRight)||(!inlayNeedsEdges&&leftNeighbor.width>0&&!slideNeedsNewRight);
      if(canAfford) controls.appendChild(h('button',{class:'strip-arrow',title:'Slide left',onClick:()=>{
        const savedStrips=state.strips.map(ss=>({...ss}));
        const savedSel=state.selectedStrip;
        let moveAmt=slideNeedsNewRight?Math.min(effectiveStep,leftNeighbor.width):Math.min(step,leftNeighbor.width);
        // If step would leave metal below min width and inlay doesn't need edges, consume all
        if(!inlayNeedsEdges&&!slideNeedsNewRight){
          const afterSlide=leftNeighbor.width-moveAmt;
          if(afterSlide>0&&afterSlide<bmMinW) moveAmt=leftNeighbor.width;
        }
        leftNeighbor.width=parseFloat((leftNeighbor.width-moveAmt).toFixed(2));
        
        // Grow or create metal on right side
        if(rightIsMetal){
          rightNeighbor.width=parseFloat((rightNeighbor.width+moveAmt).toFixed(2));
        } else {
          // Insert new metal strip after the inlay at minimum width
          state.strips.splice(si+1,0,{material:state.baseMetal,width:moveAmt});
        }
        
        // Remove left metal if it hit zero
        if(leftNeighbor.width<=0){
          state.strips.splice(si-1,1);
          state.selectedStrip=si-1; // index shifted
        }
        
        // Validate
        const ruleErr=validateProposedStrips(state.strips);
        if(ruleErr){
          state.strips=savedStrips;
          state.selectedStrip=savedSel;
          showRuleToast(ruleErr);
          return;
        }
        undoStack.push({strips:savedStrips,selectedStrip:savedSel});
        
        renderComposePanel(col);
        renderRing();
        updatePrice();
      }},['◀']));
    }
    
    controls.appendChild(h('button',{class:'strip-edit-btn',onClick:()=>{
      openEditStripModal(si);
    }},['Edit']));
    
    if(canSlideRight){
      // When creating a new metal strip on left, need at least bmMinW
      const slideNeedsNewLeft=!leftIsMetal;
      const slideEffStep=slideNeedsNewLeft?Math.max(step,bmMinW):step;
      const inlayNeedsEdgesR=needsMetalEdges(selStrip.material);
      const canAffordRight=rightIsMetal?(rightNeighbor.width>=step||(!inlayNeedsEdgesR&&rightNeighbor.width>0)):remaining>=slideEffStep;
      if(canAffordRight) controls.appendChild(h('button',{class:'strip-arrow',title:'Slide right',onClick:()=>{
        const savedStrips=state.strips.map(ss=>({...ss}));
        const savedSel=state.selectedStrip;
        if(rightIsMetal&&rightNeighbor){
          // Slide right by shrinking right metal neighbor
          let moveAmt=slideNeedsNewLeft?Math.min(slideEffStep,rightNeighbor.width):Math.min(step,rightNeighbor.width);
          // If step would leave metal below min width and inlay doesn't need edges, consume all
          if(!inlayNeedsEdgesR&&!slideNeedsNewLeft){
            const afterSlide=rightNeighbor.width-moveAmt;
            if(afterSlide>0&&afterSlide<bmMinW) moveAmt=rightNeighbor.width;
          }
          rightNeighbor.width=parseFloat((rightNeighbor.width-moveAmt).toFixed(2));
          
          // Grow or create metal on left side
          if(leftIsMetal){
            leftNeighbor.width=parseFloat((leftNeighbor.width+moveAmt).toFixed(2));
          } else {
            // Insert new metal strip before the inlay at minimum width
            state.strips.splice(si,0,{material:state.baseMetal,width:moveAmt});
            state.selectedStrip=si+1; // index shifted
          }
          
          // Remove right metal if it hit zero (recalc index after possible insert)
          const curSi=state.selectedStrip;
          const rightIdx=curSi+1;
          if(rightIdx<state.strips.length && isMetal(state.strips[rightIdx].material) && state.strips[rightIdx].width<=0){
            state.strips.splice(rightIdx,1);
          }
        } else {
          // Slide right into remaining unfilled space (base metal plane)
          const moveAmt=slideNeedsNewLeft?Math.min(slideEffStep,remaining):Math.min(step,remaining);
          if(leftIsMetal){
            leftNeighbor.width=parseFloat((leftNeighbor.width+moveAmt).toFixed(2));
          } else {
            state.strips.splice(si,0,{material:state.baseMetal,width:moveAmt});
            state.selectedStrip=si+1;
          }
        }
        
        // Validate
        const ruleErr=validateProposedStrips(state.strips);
        if(ruleErr){
          state.strips=savedStrips;
          state.selectedStrip=savedSel;
          showRuleToast(ruleErr);
          return;
        }
        undoStack.push({strips:savedStrips,selectedStrip:savedSel});
        
        renderComposePanel(col);
        renderRing();
        updatePrice();
      }},['▶']));
    }
    
    col.appendChild(controls);
    const statusParts=[selStrip.material+' ('+selStrip.width+'mm)'];
    if(canSlideLeft||canSlideRight) statusParts.push('Use arrows to slide');
    statusParts.push('Tap again to edit');
    col.appendChild(h('p',{style:{fontSize:'.65rem',color:'var(--text-muted)',margin:'0 0 8px',textAlign:'center'}},
      [statusParts.join(' · ')]));
  } else if(state.strips.length>=2){
    col.appendChild(h('p',{style:{fontSize:'.65rem',color:'var(--text-muted)',margin:'4px 0 8px',textAlign:'center'}},['Tap to select & move · Tap selected to edit · Long-press to drag · × to remove']));
  }
  
  // Validation messages
  const errors=validateStrips();
  errors.forEach(err=>{
    col.appendChild(h('div',{class:'validation-msg '+err.type},[err.msg]));
  });
  
  col.appendChild(navButtons(true, true));
  updateCanvasUndoBtn();
}

function validateStrips(){
  const errors=[];
  const usedWidth=state.strips.reduce((s,st)=>s+st.width,0);
  
  if(usedWidth>state.ringWidth){
    errors.push({type:'error',msg:`Total strip width (${usedWidth.toFixed(2)}mm) exceeds ring width (${state.ringWidth}mm). Remove or resize strips.`});
  }
  
  if(usedWidth<state.ringWidth && state.strips.length>0){
    errors.push({type:'info',msg:`${(state.ringWidth-usedWidth).toFixed(2)}mm remaining — this will be filled with a ${state.baseMetal} edge when you continue.`});
  }
  
  // Check adjacency rules for all pairs
  for(let i=0;i<state.strips.length-1;i++){
    const a=state.strips[i];
    const b=state.strips[i+1];
    if(a.material==='(choose)'||b.material==='(choose)')continue;
    const err=checkPairAdjacency(a.material,b.material);
    if(err) errors.push({type:'error',msg:err});
  }
  
  // "Must have metal edges" rule — check each qualifying inlay has metal on both sides
  for(let i=0;i<state.strips.length;i++){
    const s=state.strips[i];
    if(s.material==='(choose)'||isMetal(s.material))continue;
    if(!needsMetalEdges(s.material))continue;
    const leftOk=i>0 && isMetal(state.strips[i-1].material);
    const rightOk=i<state.strips.length-1 && isMetal(state.strips[i+1].material);
    // Right side is OK if there's remaining width (auto-closes with base metal on Continue)
    const rightEdgeOk=rightOk||(i===state.strips.length-1 && usedWidth<state.ringWidth);
    if(!leftOk){
      errors.push({type:'error',msg:`"${s.material}" must have a metal edge or pinstripe on its left side.`});
    }
    if(!rightEdgeOk){
      errors.push({type:'error',msg:`"${s.material}" must have a metal edge or pinstripe on its right side.`});
    }
  }
  
  // Faceted Gibeon Meteorite: must have metal edges on both sides
  for(let i=0;i<state.strips.length;i++){
    const s=state.strips[i];
    if(s.material!=='Faceted Gibeon Meteorite')continue;
    const leftOk=i>0 && isMetal(state.strips[i-1].material);
    const rightOk=i<state.strips.length-1 && isMetal(state.strips[i+1].material);
    const rightEdgeOk=rightOk||(i===state.strips.length-1 && usedWidth<state.ringWidth);
    if(!leftOk) errors.push({type:'error',msg:`"Faceted Gibeon Meteorite" requires metal edges — missing on left side.`});
    if(!rightEdgeOk) errors.push({type:'error',msg:`"Faceted Gibeon Meteorite" requires metal edges — missing on right side.`});
  }
  
  // Whale Bone: no inlays into Black Ceramic base
  for(const s of state.strips){
    if(s.material==='Whale Bone' && state.baseMetal==='Black Ceramic'){
      errors.push({type:'error',msg:`"Whale Bone" cannot be inlaid into a Black Ceramic ring.`});
    }
  }
  
  // Min width check
  for(const s of state.strips){
    if(s.material==='(choose)')continue;
    const mat=DATA.m[s.material];
    if(!mat)continue;
    let minW=0;
    if(isMetal(s.material)){
      minW=mat.mi.edge_same_sleeve||0.25;
    } else {
      minW=mat.mi.solid_inlay||mat.mi.inlay_swarf||0.5;
    }
    if(s.width<minW && minW>0){
      errors.push({type:'error',msg:`"${s.material}" requires minimum width of ${minW}mm (currently ${s.width}mm).`});
    }
  }
  
  return errors;
}

// ── ADJACENCY RULE HELPERS ──
// Groups that MUST have metal edges or metal pinstripes on both sides
const NEEDS_METAL_EDGES_GROUPS=new Set([
  'Mother of Pearl','Petals','Sand','Stardust','Guitar Strings'
]);

function needsMetalEdges(matName){
  const d=DATA.m[matName];
  if(!d)return false;
  if(NEEDS_METAL_EDGES_GROUPS.has(d.g))return true;
  if(matName==='Faceted Gibeon Meteorite')return true;
  return false;
}

function isCoatedGroup(matName){
  const d=DATA.m[matName];
  return d && d.g==='Enamel';
}

function isSwarf(matName){
  const d=DATA.m[matName];
  return d && d.s==='Liquid';
}

function isSolidLapidary(matName){
  const d=DATA.m[matName];
  return d && (d.g==='Lapidary'||d.g==='Dinosaur Bone') && d.s==='Solid';
}

// Check if two adjacent non-metal materials violate a rule.
// Returns error message string or null if OK.
function checkPairAdjacency(matA,matB){
  if(isMetal(matA)||isMetal(matB))return null;
  const dA=DATA.m[matA], dB=DATA.m[matB];
  if(!dA||!dB)return null;
  
  // Wood ≠ solid lapidary (crushed/liquid lapidary is OK)
  if(dA.g==='Woods' && isSolidLapidary(matB))
    return `"${matA}" (wood) cannot be next to "${matB}" (solid stone). Use crushed stone or add a metal pinstripe.`;
  if(dB.g==='Woods' && isSolidLapidary(matA))
    return `"${matB}" (wood) cannot be next to "${matA}" (solid stone). Use crushed stone or add a metal pinstripe.`;
  
  // Mokume Composite ≠ coated (Enamel) without metal between
  if(dA.g==='Mokume Composite' && isCoatedGroup(matB))
    return `"${matA}" (Mokume) must have metal between it and "${matB}" (coated material).`;
  if(dB.g==='Mokume Composite' && isCoatedGroup(matA))
    return `"${matB}" (Mokume) must have metal between it and "${matA}" (coated material).`;
  
  // Solid Lapidary ≠ coated (Enamel)
  if(isSolidLapidary(matA) && isCoatedGroup(matB))
    return `"${matA}" (solid stone) cannot be next to "${matB}" (coated). Add a metal pinstripe.`;
  if(isSolidLapidary(matB) && isCoatedGroup(matA))
    return `"${matB}" (solid stone) cannot be next to "${matA}" (coated). Add a metal pinstripe.`;
  
  // Carbon Fiber ≠ swarf/coated
  if(dA.g==='Carbon Fiber' && (isSwarf(matB)||isCoatedGroup(matB)))
    return `"${matA}" cannot be next to "${matB}". Add a metal pinstripe.`;
  if(dB.g==='Carbon Fiber' && (isSwarf(matA)||isCoatedGroup(matA)))
    return `"${matB}" cannot be next to "${matA}". Add a metal pinstripe.`;
  
  // Vinyl ≠ crushed (Liquid subtype)
  if(dA.g==='Vinyl Record' && isSwarf(matB))
    return `"${matA}" cannot be next to "${matB}" (crushed material). Add a metal pinstripe.`;
  if(dB.g==='Vinyl Record' && isSwarf(matA))
    return `"${matB}" cannot be next to "${matA}" (crushed material). Add a metal pinstripe.`;
  
  // Feather/Fur ≠ swarf or solid coated
  if((matA==='Supply Your Own Fur'||matA==='Supply Your Own Horse Hoof') && (isSwarf(matB)||isCoatedGroup(matB)))
    return `"${matA}" cannot be next to "${matB}". Add a metal pinstripe.`;
  if((matB==='Supply Your Own Fur'||matB==='Supply Your Own Horse Hoof') && (isSwarf(matA)||isCoatedGroup(matA)))
    return `"${matB}" cannot be next to "${matA}". Add a metal pinstripe.`;
  
  // Whale Bone ≠ wood (unless whale bone is crushed — but WB in our data is Liquid/crushed only, so solid wood is the concern)
  if(matA==='Whale Bone' && dB.g==='Woods' && dB.s==='Solid')
    return `"Whale Bone" cannot be next to "${matB}" (solid wood). Add a metal pinstripe.`;
  if(matB==='Whale Bone' && dA.g==='Woods' && dA.s==='Solid')
    return `"Whale Bone" cannot be next to "${matA}" (solid wood). Add a metal pinstripe.`;
  
  // "Must have metal edges" groups: if two such materials are adjacent (both non-metal), that's a violation
  if(needsMetalEdges(matA) && !isMetal(matB))
    return `"${matA}" must have metal on each side — cannot be directly next to "${matB}".`;
  if(needsMetalEdges(matB) && !isMetal(matA))
    return `"${matB}" must have metal on each side — cannot be directly next to "${matA}".`;
  
  return null;
}

// Validate a proposed strip arrangement. Returns first error message or null.
function validateProposedStrips(strips){
  for(let i=0;i<strips.length-1;i++){
    const a=strips[i], b=strips[i+1];
    if(a.material==='(choose)'||b.material==='(choose)')continue;
    const err=checkPairAdjacency(a.material,b.material);
    if(err) return err;
  }
  // Check metal-edges requirements
  for(let i=0;i<strips.length;i++){
    const s=strips[i];
    if(s.material==='(choose)'||isMetal(s.material))continue;
    if(!needsMetalEdges(s.material))continue;
    const leftOk=i>0 && isMetal(strips[i-1].material);
    const rightOk=i<strips.length-1 && isMetal(strips[i+1].material);
    const usedW=strips.reduce((sum,st)=>sum+st.width,0);
    const rightEdgeOk=rightOk||(i===strips.length-1 && usedW<state.ringWidth);
    if(!leftOk) return `"${s.material}" must have metal on its left side.`;
    if(!rightEdgeOk) return `"${s.material}" must have metal on its right side.`;
  }
  // Whale Bone cannot be inlaid into Black Ceramic
  for(const s of strips){
    if(s.material==='Whale Bone' && state.baseMetal==='Black Ceramic')
      return `"Whale Bone" cannot be inlaid into a Black Ceramic ring.`;
  }
  // Min width check
  for(const s of strips){
    if(s.material==='(choose)')continue;
    const mat=DATA.m[s.material];
    if(!mat)continue;
    let minW=0;
    if(isMetal(s.material)){
      minW=mat.mi.edge_same_sleeve||0.25;
    } else {
      minW=mat.mi.solid_inlay||mat.mi.inlay_swarf||0.5;
    }
    if(s.width<minW && minW>0 && s.width>0){
      return `"${s.material}" requires minimum width of ${minW}mm (currently ${s.width}mm).`;
    }
  }
  return null;
}

// Toast notification for blocked actions
function showRuleToast(msg){
  // Remove any existing toast
  const old=document.querySelector('.rule-toast');
  if(old) old.remove();
  const toast=document.createElement('div');
  toast.className='rule-toast';
  toast.textContent='⚠ '+msg;
  document.body.appendChild(toast);
  setTimeout(()=>{if(toast.parentNode)toast.remove();},3500);
}

// ── ADD STRIP MODAL ──
function getBaseMetalMinWidth(){
  if(!state.baseMetal||!DATA.m[state.baseMetal])return 0.5;
  return DATA.m[state.baseMetal].mi.edge_same_sleeve||0.5;
}

function openAddStripModal(){
  const overlay=$('#addStripModal');
  const modal=$('#addStripModalInner');
  overlay.classList.add('open');
  
  let selectedMat=null;
  let stripWidth=2;
  let searchFilter='';
  let groupFilter='All';
  
  // Determine insertion index: after selected strip, or at end
  const insertIdx=(state.selectedStrip>=0)?state.selectedStrip+1:state.strips.length;
  
  // Check neighbors at insertion point for auto-pinstripe logic
  const bmMinW=getBaseMetalMinWidth();
  const stripBefore=insertIdx>0?state.strips[insertIdx-1]:null;
  const stripAfter=insertIdx<state.strips.length?state.strips[insertIdx]:null;
  const beforeIsInlay=stripBefore&&!isMetal(stripBefore.material);
  const afterIsMetal=stripAfter&&isMetal(stripAfter.material);
  const needsAutoBefore=(state.strips.length===0)||(beforeIsInlay);
  // Only auto-insert pinstripe before if the neighbor before is an inlay
  const autoWidth=needsAutoBefore?bmMinW:0;
  
  const usedWidth=state.strips.reduce((s,st)=>s+st.width,0);
  const remaining=state.ringWidth-usedWidth;
  const availableForInlay=remaining;
  
  function render(){
    modal.innerHTML='';
    modal.appendChild(h('h3',{},['Add an Inlay Strip']));
    modal.appendChild(h('button',{style:{position:'absolute',top:'12px',right:'16px',fontSize:'1.2rem',color:'var(--text-muted)'},onClick:()=>overlay.classList.remove('open')},['×']));
    
    // Position info
    if(state.selectedStrip>=0){
      modal.appendChild(h('div',{class:'validation-msg info',style:{marginBottom:'10px'}},
        ['Inserting after strip '+(state.selectedStrip+1)+' ('+state.strips[state.selectedStrip].material+').']));
    }
    
    // Auto-pinstripe info — only show if there's room for it
    const roomForAuto=remaining-stripWidth>=bmMinW;
    if(needsAutoBefore&&state.strips.length===0&&roomForAuto){
      modal.appendChild(h('div',{class:'validation-msg info',style:{marginBottom:'10px'}},
        [`A ${bmMinW}mm ${state.baseMetal} edge will be added on the left automatically.`]));
    } else if(needsAutoBefore&&roomForAuto){
      modal.appendChild(h('div',{class:'validation-msg info',style:{marginBottom:'10px'}},
        [`A ${bmMinW}mm ${state.baseMetal} pinstripe will be auto-inserted before this strip.`]));
    }
    
    // WIDTH FIRST
    const displayAvail=roomForAuto?remaining-bmMinW:remaining;
    modal.appendChild(h('div',{style:{marginBottom:'14px'}},[
      h('label',{style:{display:'block',fontSize:'.75rem',fontWeight:'500',color:'var(--text-dim)',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'.05em'}},['Strip Width']),
      h('div',{class:'width-picker',style:{margin:'0'}},[
        h('input',{type:'number',min:'0.25',max:String(Math.max(0.25,availableForInlay)),step:'0.25',value:String(stripWidth),
          onChange:(e)=>{
            let v=parseFloat(e.target.value);
            if(isNaN(v)||v<0.25)v=0.25;
            if(v>availableForInlay)v=availableForInlay;
            stripWidth=v;
            render();
          }
        }),
        h('span',{style:{fontSize:'.75rem',color:'var(--text-muted)'}},['mm']),
        h('span',{style:{fontSize:'.68rem',color:'var(--text-muted)',marginLeft:'8px'}},
          ['Available: '+displayAvail.toFixed(2)+'mm'+(roomForAuto&&needsAutoBefore?' (after auto '+state.baseMetal+')':'')])
      ])
    ]));
    
    // THEN MATERIAL
    modal.appendChild(h('label',{style:{display:'block',fontSize:'.75rem',fontWeight:'500',color:'var(--text-dim)',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'.05em'}},['Material']));
    
    // Group filter
    const groups=h('div',{class:'mat-groups',style:{marginBottom:'10px'}});
    const allGroups=['All',...getAllGroups()];
    allGroups.forEach(g=>{
      groups.appendChild(h('button',{class:'mat-group-btn'+(groupFilter===g?' active':''),onClick:()=>{
        groupFilter=g;
        render();
      }},[g]));
    });
    modal.appendChild(groups);
    
    // Search
    const search=h('input',{class:'mat-search',type:'text',placeholder:'Search materials...',value:searchFilter,
      onInput:(e)=>{searchFilter=e.target.value;render();}
    });
    modal.appendChild(search);
    
    // Material grid — default: show inlay materials only; 'All' shows everything
    const grid=h('div',{class:'mat-grid',style:{maxHeight:'200px'}});
    let materials=Object.keys(DATA.m);
    if(groupFilter==='most popular Woods') materials=materials.filter(n=>DATA.m[n].g==='Woods'&&POPULAR_WOODS.has(n));
    else if(groupFilter==='other Woods') materials=materials.filter(n=>DATA.m[n].g==='Woods'&&!POPULAR_WOODS.has(n));
    else if(groupFilter!=='All') materials=materials.filter(n=>DATA.m[n].g===groupFilter);
    else materials=materials.filter(n=>!isMetal(n));
    if(searchFilter) materials=materials.filter(n=>n.toLowerCase().includes(searchFilter.toLowerCase()));
    materials.sort();
    
    materials.forEach(name=>{
      const mat=DATA.m[name];
      const matMin=isMetal(name)?(mat.mi.edge_same_sleeve||0.25):(mat.mi.solid_inlay||mat.mi.inlay_swarf||0.5);
      const tooWide=stripWidth<matMin;
      const card=h('div',{
        class:'mat-card'+(selectedMat===name?' selected':'')+(tooWide?' disabled':''),
        onClick:()=>{if(!tooWide){selectedMat=name;render();}}
      },[
        matSwatch(name),
        h('div',{class:'name'},[name+(tooWide?' (min '+matMin+'mm)':'')])
      ]);
      if(_staffMode&&!tooWide)card.title=name+' @ '+stripWidth+'mm: '+staffFmtPrice(staffStripPrice(name,stripWidth));
      grid.appendChild(card);
    });
    modal.appendChild(grid);
    
    // Confirm button
    modal.appendChild(h('div',{style:{marginTop:'16px',display:'flex',gap:'8px',justifyContent:'flex-end'}},[
      h('button',{class:'btn btn-outline',onClick:()=>overlay.classList.remove('open')},['Cancel']),
      h('button',{class:'btn btn-gold',disabled:!selectedMat||stripWidth<=0,onClick:()=>{
        if(!selectedMat||stripWidth<=0)return;
        
        const savedStrips=state.strips.map(ss=>({...ss}));
        let pos=insertIdx;
        
        // Auto-insert base metal edge/pinstripe if adding an inlay AND there's room
        const roomForAutoNow=remaining-stripWidth>=bmMinW;
        if(!isMetal(selectedMat)&&needsAutoBefore&&roomForAutoNow){
          state.strips.splice(pos,0,{material:state.baseMetal,width:bmMinW});
          pos++; // shift insertion point past the auto-inserted strip
        }
        
        // Insert the strip at position
        state.strips.splice(pos,0,{material:selectedMat,width:stripWidth});
        
        // Validate the proposed arrangement
        const ruleErr=validateProposedStrips(state.strips);
        if(ruleErr){
          state.strips=savedStrips;
          showRuleToast(ruleErr);
          return;
        }
        undoStack.push({strips:savedStrips,selectedStrip:state.selectedStrip});
        
        state.selectedStrip=-1;
        overlay.classList.remove('open');
        const col=$('#controlsCol');
        renderComposePanel(col);
        renderRing();
        updatePrice();
      }},['Add Strip'])
    ]));
    if(searchFilter){const si=modal.querySelector('.mat-search');if(si){si.focus();si.selectionStart=si.selectionEnd=searchFilter.length;}}
  }
  
  render();
}

      }},[g]));
    });
    modal.appendChild(groups);
    
    // Search
    modal.appendChild(h('input',{class:'mat-search',type:'text',placeholder:'Search materials...',value:searchFilter,
      onInput:(e)=>{searchFilter=e.target.value;render();}
    }));
    
    // Material grid — ALL materials shown
    const grid=h('div',{class:'mat-grid',style:{maxHeight:'200px'}});
    let materials=Object.keys(DATA.m);
    if(groupFilter==='most popular Woods') materials=materials.filter(n=>DATA.m[n].g==='Woods'&&POPULAR_WOODS.has(n));
    else if(groupFilter==='other Woods') materials=materials.filter(n=>DATA.m[n].g==='Woods'&&!POPULAR_WOODS.has(n));
    else if(groupFilter!=='All') materials=materials.filter(n=>DATA.m[n].g===groupFilter);
    if(searchFilter) materials=materials.filter(n=>n.toLowerCase().includes(searchFilter.toLowerCase()));
    materials.sort();
    
    materials.forEach(name=>{
      const mat=DATA.m[name];
      const matMin=isMetal(name)?(mat.mi.edge_same_sleeve||0.25):(mat.mi.solid_inlay||mat.mi.inlay_swarf||0.5);
      const tooNarrow=stripWidth<matMin;
      const card=h('div',{
        class:'mat-card'+(selectedMat===name?' selected':'')+(tooNarrow?' disabled':''),
        onClick:()=>{if(!tooNarrow){selectedMat=name;render();}}
      },[
        matSwatch(name),
        h('div',{class:'name'},[name+(tooNarrow?' (min '+matMin+'mm)':'')])
      ]);
      if(_staffMode&&!tooNarrow)card.title=name+' @ '+stripWidth+'mm: '+staffFmtPrice(staffStripPrice(name,stripWidth));
      grid.appendChild(card);
    });
    modal.appendChild(grid);
    
    // Confirm
    modal.appendChild(h('div',{style:{marginTop:'16px',display:'flex',gap:'8px',justifyContent:'flex-end'}},[
      h('button',{class:'btn btn-outline',onClick:()=>overlay.classList.remove('open')},['Cancel']),
      h('button',{class:'btn btn-gold',disabled:!selectedMat||stripWidth<=0,onClick:()=>{
        if(!selectedMat||stripWidth<=0)return;
        const savedStrips=state.strips.map(ss=>({...ss}));
        const origStrip=state.strips[idx];
        const origWasMetal=isMetal(origStrip.material);
        const newIsInlay=!isMetal(selectedMat);
        
        if(origWasMetal && newIsInlay && stripWidth < origStrip.width){
          // Splitting a metal strip: keep leftover metal on left, new inlay on right
          const leftover=parseFloat((origStrip.width-stripWidth).toFixed(2));
          state.strips.splice(idx,1,
            {material:origStrip.material,width:leftover},
            {material:selectedMat,width:stripWidth}
          );
        } else {
          state.strips[idx]={material:selectedMat,width:stripWidth};
        }
        
        // Validate the proposed arrangement
        const ruleErr=validateProposedStrips(state.strips);
        if(ruleErr){
          state.strips=savedStrips;
          showRuleToast(ruleErr);
          return;
        }
        undoStack.push({strips:savedStrips,selectedStrip:state.selectedStrip});
        
        state.selectedStrip=-1;
        overlay.classList.remove('open');
        const col=$('#controlsCol');
        renderComposePanel(col);
        renderRing();
        updatePrice();
      }},['Save Changes'])
    ]));
    if(searchFilter){const si=modal.querySelector('.mat-search');if(si){si.focus();si.selectionStart=si.selectionEnd=searchFilter.length;}}
  }
  
  render();
}

// ── STEP 4: SLEEVE ──
function renderSleevePanel(col){
  col.innerHTML='';
  col.appendChild(h('h2',{class:'panel-title'},['Inner Sleeve (Optional)']));
  col.appendChild(h('p',{class:'panel-desc'},['The sleeve is the inside of the ring that touches your finger. It defaults to your base metal — only change this if you want a different inner material.']));
  
  // Default to base metal
  if(!state.sleeve) state.sleeve=state.baseMetal;
  
  // Sleeve group tabs
  let activeSleeveGroup='default';
  const groupBar=h('div',{class:'mat-groups',style:{marginBottom:'12px'}});
  
  function renderSleeveGroup(gName){
    activeSleeveGroup=gName;
    $$('.mat-group-btn',groupBar).forEach(b=>b.classList.toggle('active',b.dataset.g===gName));
    sleeveGrid.innerHTML='';
    
    let materials=[];
    if(gName==='default'){
      // Just show the base metal as the default choice
      const defCard=h('div',{
        class:'mat-card'+(state.sleeve===state.baseMetal?' selected':''),
        onClick:()=>{
          state.sleeve=state.baseMetal;
          renderSleevePanel(col);
          renderRing();
          updatePrice();
        }
      },[
        matSwatch(state.baseMetal),
        h('div',{class:'name'},[state.baseMetal+' (same as base metal)'])
      ]);
      sleeveGrid.appendChild(defCard);
      return;
    }
    if(gName==='metals'){
      materials=SLEEVE_MATERIALS.filter(n=>DATA.m[n]&&n!==state.baseMetal);
    }
    if(gName==='woods'){
      // Show woods that have sleeve capability
      materials=Object.keys(DATA.m).filter(n=>{
        const m=DATA.m[n];
        if(m.g!=='Woods')return false;
        const mins=m.mi;
        return mins.sleeve>0||mins.sleeve_with_inlay>0;
      }).sort();
      // Also include any wood — most can be used as sleeves
      if(materials.length===0){
        materials=Object.keys(DATA.m).filter(n=>DATA.m[n].g==='Woods').sort();
      }
    }
    
    materials.forEach(name=>{
      const card=h('div',{
        class:'mat-card'+(state.sleeve===name?' selected':''),
        onClick:()=>{
          state.sleeve=name;
          renderSleevePanel(col);
          renderRing();
          updatePrice();
        }
      },[
        matSwatch(name),
        h('div',{class:'name'},[name])
      ]);
      sleeveGrid.appendChild(card);
    });
  }
  
  ['default','metals','woods'].forEach(g=>{
    const label=g==='default'?'Default (Base Metal)':g==='metals'?'Other Metals':'Wood Sleeves';
    const btn=h('button',{class:'mat-group-btn'+(g===activeSleeveGroup?' active':''),'data-g':g,onClick:()=>{
      renderSleeveGroup(g);
      if(g==='default'&&state.sleeve!==state.baseMetal){state.sleeve=state.baseMetal;renderRing();updatePrice();}
    }},[label]);
    groupBar.appendChild(btn);
  });
  col.appendChild(groupBar);
  
  const sleeveGrid=h('div',{class:'mat-grid'});
  col.appendChild(sleeveGrid);
  renderSleeveGroup(state.sleeve===state.baseMetal?'default':'metals');
  
  // Show current selection
  if(state.sleeve&&state.sleeve!==state.baseMetal){
    col.appendChild(h('div',{class:'validation-msg info',style:{marginTop:'10px'}},
      ['Sleeve changed to '+state.sleeve+'. This may affect pricing.']));
  }
  
  col.appendChild(navButtons(true, state.sleeve!==null));
}

  col.appendChild(nav);
}

function navButtons(showPrev, showNext){
  const nav=h('div',{class:'nav-buttons'});

    nav.appendChild(h('button',{class:'btn-nav btn-prev',onClick:()=>goToStep(state.step-1)},['← Back']));

// ── LOAD DESIGN FROM URL ──
function loadDesignFromURL(){
  const params=new URLSearchParams(window.location.search);
  const design=params.get('design');
  if(!design)return;
  try{
    const config=JSON.parse(atou(design));
    if(config.bm) state.baseMetal=config.bm;
    if(config.w) state.ringWidth=config.w;
    if(config.p) state.profile=config.p;
    if(config.st) state.strips=config.st;
    if(config.sl) state.sleeve=config.sl;
    if(config.f) state.finish=config.f;
    if(config.sz) state.ringSize=config.sz;
    if(config.eng) state.engraving=config.eng;
    if(config.wi!=null) state.wantsInlays=config.wi;
    state.step=6; // go to summary
  }catch(e){console.warn('Invalid design URL');}
}

// ── INIT ──
function patchPricingData(){
  if(!DATA||!DATA.p)return;
  // Titanium base prices
  const ti={fixed_price:84,sleeve:124.6,sleeve_with_inlay:181,partials:76,split:181,shaped:276,full_ring:124.6};
  // Black Ceramic: preserve existing fields, fill missing with Ti×1.5
  const ti150={};
  for(const k in ti) ti150[k]=Math.round(ti[k]*1.5*100)/100;
  if(!DATA.p['Black Ceramic']) DATA.p['Black Ceramic']={};
  const bc=DATA.p['Black Ceramic'];
  for(const k in ti150){if(!bc[k])bc[k]=ti150[k];}
  // Damascus: flat $580 for base metal, inlays, and inner sleeves (all sizes)
  if(!DATA.p['Damascus']) DATA.p['Damascus']={};
  DATA.p['Damascus'].fixed_price=580;
  DATA.p['Damascus'].sleeve=580;
  DATA.p['Damascus'].sleeve_with_inlay=580;
  DATA.p['Damascus'].full_ring=580;
  DATA.p['Damascus'].partials=580;
  delete DATA.p['Damascus'].per_mm_base;
  delete DATA.p['Damascus'].per_mm_sleeve;
  delete DATA.p['Damascus'].inlay_by_width;
  // Zirconium: per-mm base=$(0x34*0x64+0x39)/0x64 (from $368/7mm size 10), inlay by width (+$20 labor)
  if(!DATA.p['Zirconium']) DATA.p['Zirconium']={};
  DATA.p['Zirconium'].per_mm_base=(0x34*0x64+0x39)/0x64;
  DATA.p['Zirconium'].per_mm_sleeve=(0x34*0x64+0x39)/0x64;
  DATA.p['Zirconium'].inlay_by_width=[[1,24.95],[2,25.66],[3,26.36],[4,27.07],[5,27.77],[6,28.48],[7,29.18],[8,29.88],[9,30.59],[10,31.29]];
  // Stainless: per-mm base=$(0x31*0x64+0x4B)/0x64 (from $199/4mm size 10), inlay by width (+$20 labor)
  if(!DATA.p['Stainless']) DATA.p['Stainless']={};
  DATA.p['Stainless'].per_mm_base=(0x31*0x64+0x4B)/0x64;
  DATA.p['Stainless'].per_mm_sleeve=(0x31*0x64+0x4B)/0x64;
  DATA.p['Stainless'].inlay_by_width=[[1,24.54],[2,24.83],[3,25.12],[4,25.42],[5,25.71],[6,26.00],[7,26.29],[8,26.58],[9,26.87],[10,27.17]];
  // Metal Mokume: per-mm pricing handled in calcPrice/getInlayPrice
  if(!DATA.p['Metal Mokume']) DATA.p['Metal Mokume']={};
  DATA.p['Metal Mokume'].per_mm_base=150;
  DATA.p['Metal Mokume'].per_mm_inlay=75;
  DATA.p['Metal Mokume'].per_mm_sleeve=100;
  // Jade variants: catalog has "Jade - Black" / "Jade - Green" but pricing only has "Jade"
  if(DATA.p['Jade']&&!DATA.p['Jade - Black']){DATA.p['Jade - Black']=Object.assign({},DATA.p['Jade']);}
  if(DATA.p['Jade']&&!DATA.p['Jade - Green']){DATA.p['Jade - Green']=Object.assign({},DATA.p['Jade']);}
  if(DATA.pm){
    if(DATA.pm['Jade']&&!DATA.pm['Jade - Black']){DATA.pm['Jade - Black']=DATA.pm['Jade'].map(e=>[...e]);}
    if(DATA.pm['Jade']&&!DATA.pm['Jade - Green']){DATA.pm['Jade - Green']=DATA.pm['Jade'].map(e=>[...e]);}
    // Stones 9.75mm price anomaly fix ($622.1 should be $677.1)
    if(DATA.pm['Stones']){DATA.pm['Stones'].forEach(e=>{if(e[0]===9.75&&e[1]===622.1)e[1]=677.1;});}
    // Sugilite: ensure width entries are sorted ascending by mm
    if(DATA.pm['Sugilite']){DATA.pm['Sugilite'].sort((a,b)=>a[0]-b[0]);}
    // Turquoise 4.25mm: $409.25 should be $409.2 (consistency fix)
    if(DATA.pm['Turquoise']){DATA.pm['Turquoise'].forEach(e=>{if(e[0]===4.25&&e[1]===409.25)e[1]=409.2;});}
  }
  console.log('Patched pricing: Damascus($580 flat), Zirconium($(0x34*0x64+0x39)/0x64/mm), Stainless($(0x31*0x64+0x4B)/0x64/mm), Black Ceramic(Ti×1.5), Mokume(per-mm)');
}

async function init(){
  let _pricingFromKV=false;
  // Try loading pricing from Cloudflare KV (via spot-prices worker)
  try{
    const kvRes=await fetch('https://jbj-spot-prices.johan-475.workers.dev/pricing');
    if(kvRes.ok){
      const kv=await kvRes.json();
      if(kv.base_prices&&kv.material_groups){
        // Start with embedded material definitions + colors, overlay KV pricing
        DATA=Object.assign({},_ED_BASE);
        DATA.p=kv.base_prices;DATA.pm=kv.width_prices||{};DATA.mp=kv.meteorite_prices||[];DATA.mk=kv.mokume_prices||[];DATA.f=kv.formula_constants||{};
        if(kv.misc_costs)DATA.misc_costs=kv.misc_costs;
        _pricingFromKV=true;
        console.log('%c✅ Pricing loaded from: CF Worker (KV) — v'+(kv._version||'?'),'color:#2ecc71;font-weight:bold');
      }
    }
  }catch(e){console.log('KV pricing fetch failed, using embedded:',e.message);}
  if(!DATA){
    DATA=EMBEDDED_DATA;
    console.log('%c⚠️ Using embedded pricing data (KV unavailable)','color:#f39c12;font-weight:bold');
  }
  // Only patch if using embedded data (KV data already has all patches baked in)
  if(!_pricingFromKV) patchPricingData();
  
  // Load design from URL if present
  loadDesignFromURL();
  
  // Fetch live spot prices
  fetchSpotPrices();
  
  // Initial render
  renderStepsBar();
  renderPanel();
  renderRing();
  updatePrice();
  
  // Close modal on overlay click
  $('#addStripModal').addEventListener('click',(e)=>{
    if(e.target===$('#addStripModal'))$('#addStripModal').classList.remove('open');
  });
}

   Sections 1-6 = verbatim renderXPanel builders. Section 7 = renderSummaryPanel (submit+share).
   Price: retail sees it only when summary is open; staff (?staff) always. */
(function(){
  'use strict';

  const V2_STEPS = [
    {id:'size',   label:'Ring Size'},
    {id:'metal',  label:'Base Metal'},
    {id:'width',  label:'Width & Profile'},
    {id:'compose',label:'Inlays'},
    {id:'sleeve', label:'Sleeve'},
    {id:'finish', label:'Finish'},
    {id:'summary',label:'Summary'}
  ];

  state._openSection = 'size';   // which panel is expanded (null = all collapsed)

  // ---- Header summary text per section ----
  function summaryText(stepId){
    switch(stepId){
      case 'size':    return state.ringSize!=null?('Size '+state.ringSize):'';
      case 'metal':   return state.baseMetal||'';
      case 'width':   return (state.ringSize!=null&&state.baseMetal)?(state.ringWidth+'mm · '+(state.profile||'Flat')):'';
      case 'compose': return (state.strips&&state.strips.length)?('Inlays: '+state.strips.filter(function(s){return window.isMetal?!isMetal(s.material):true;}).length):'No inlays';
      case 'sleeve':  return state.sleeve?('Sleeve: '+state.sleeve):(state.baseMetal?('Sleeve: '+state.baseMetal):'');
      case 'finish':  return state.finish||'';
      case 'summary': return '';
      default: return '';
    }
  }

  function bodyEl(id){ return document.getElementById('acc-body-'+id); }
  function panelEl(id){ return document.getElementById('acc-panel-'+id); }

  // ---- Render one section's real controls via the verbatim engine builder ----
  function rerenderSection(id){
    const host = bodyEl(id); if(!host) return;
    switch(id){
      case 'size':    renderSizePanel(host);    break;
      case 'metal':   renderMetalPanel(host);   break;
      case 'width':   renderWidthPanel(host); stripInlayToggle(host);   break;
      case 'compose': if(window.renderComposePanel) renderComposePanel(document.getElementById('controlsCol')); break;
      case 'sleeve':  renderSleevePanel(host);  break;
      case 'finish':  host.innerHTML=''; renderFinishPanel(host);  break;
      case 'summary': host.innerHTML=''; renderSummaryPanel(host); injectFontSelect(host); break;
    }
  }

  // ---- Dependency invalidation (engine V1 rules; re-render affected panels) ----
  function applyDependencyRules(changedStepId){
    if(changedStepId==='metal'){
      state.sleeve = state.baseMetal;
      if(window.getCompatibleFinishes){
        const ok = getCompatibleFinishes(state.baseMetal);
        if(state.finish && ok.indexOf(state.finish)===-1) state.finish=null;
      }
      if(window.getCompatibleProfiles){
        const okP = getCompatibleProfiles(state.baseMetal);
        if(state.profile && okP.indexOf(state.profile)===-1) state.profile='Flat';
      }
      rerenderSection('width'); rerenderSection('compose');
      rerenderSection('sleeve'); rerenderSection('finish');
    }
    if(changedStepId==='width'){
      state.strips=[]; if(window.undoStack) undoStack.length=0; state.selectedStrip=-1;
      rerenderSection('compose');
    }
    if(changedStepId==='compose'){
      if(state.wantsInlays===false){ state.strips=[]; }
    }
  }

  // ---- Update all header summaries + filled badges + price visibility ----
  function refreshHeaders(){
    V2_STEPS.forEach(function(st){
      const p=panelEl(st.id); if(!p) return;
      const txt=summaryText(st.id);
      p.classList.toggle('filled', !!txt && st.id!=='summary' && !!(state._touched&&state._touched[st.id]));
      const sum=document.getElementById('acc-sum-'+st.id);
      if(sum) sum.textContent = txt;
    });
  }

  // ---- Price (retail: only when summary open; staff: always) ----
  function updatePriceBar(){
    const bar=document.getElementById('v2-price'); if(!bar) return;
    const isStaff = document.body.classList.contains('staff-mode');
    const show = isStaff || state._openSection==='summary';
    bar.style.display = show?'block':'none';
    if(!show) return;
    let total=null;
    try{
      if(typeof DATA!=='undefined' && DATA && DATA.p && state.baseMetal){
        const r=calcPrice();
        if(r && typeof r.total==='number') total=r.total;
      }
    }catch(e){ total=null; }
    bar.textContent = (total==null)?'—':('$'+total.toFixed(2));
  }

  // ---- Central hook fired after every engine selection (via updatePrice wrapper) ----
  function onSelection(){
    applyDependencyRules(state._openSection);
    refreshHeaders();
    if(window.renderRing) try{ renderRing(); }catch(e){}
    updatePriceBar();
    // move the open section to the top of the screen after a selection
    var op=state._openSection && panelEl(state._openSection);
    if(op) setTimeout(function(){ op.scrollIntoView({behavior:'smooth',block:'start'}); }, 0);
  }

  function installUpdateHook(){
    if(typeof window.updatePrice!=='function' || window.updatePrice.__v2wrapped) return;
    var orig=window.updatePrice;
    var wrapped=function(){
      var r; try{ r=orig.apply(this,arguments); }catch(e){}
      try{ onSelection(); }catch(e){}
      return r;
    };
    wrapped.__v2wrapped=true;
    window.updatePrice=wrapped;
  }

  // ---- Accordion open/collapse: one at a time; same header toggles closed ----
  function toggleSection(id){
    const next = (state._openSection===id) ? null : id;
    openSection(next);
  }
  // keep engine's numeric state.step synced to the open section (navButtons uses it)
  function syncStep(id){
    var i=V2_STEPS.findIndex(function(s){return s.id===id;});
    if(i>=0) state.step=i;
  }
  // engine navButtons() calls goToStep(state.step±1); map index -> section + open it
  window.goToStep=function(idx){
    if(idx<0) idx=0; if(idx>V2_STEPS.length-1) idx=V2_STEPS.length-1;
    openSection(V2_STEPS[idx].id);
    var p=panelEl(V2_STEPS[idx].id); if(p) p.scrollIntoView({behavior:'smooth',block:'start'});
  };
  window.onContinue=function(){ window.goToStep((state.step||0)+1); };
  window.onBack=function(){ window.goToStep((state.step||0)-1); };

  function openSection(id){
    state._openSection=id; syncStep(id);
    if(id){ state._touched=state._touched||{}; state._touched[id]=true; }
    if(id==='summary'){ closeBand(); rerenderSection('summary'); if(window.renderRing){try{renderRing();}catch(e){}} }
    V2_STEPS.forEach(function(st){
      const p=panelEl(st.id); if(!p) return;
      const open=(st.id===id);
      p.classList.toggle('open', open);
      var hbtn=p.querySelector('.acc-head'); if(hbtn) hbtn.setAttribute('aria-expanded', open?'true':'false');
    });
    refreshHeaders();
    updatePriceBar();   // summary open toggles retail price visibility
    if(id){
      var op=panelEl(id);
      if(op) setTimeout(function(){ op.scrollIntoView({behavior:'smooth',block:'start'}); }, 320);
    }
  }

  // ---- KV pricing loader (verbatim strict-KV, no fallback) ----
  async function v2LoadPricing(){
    try{
      const kvRes=await fetch('https://jbj-spot-prices.johan-475.workers.dev/pricing');
      if(kvRes.ok){
        const kv=await kvRes.json();
        if(kv.base_prices&&kv.material_groups){
          DATA=Object.assign({},(typeof _ED_BASE!=='undefined'?_ED_BASE:{}));
          DATA.p=kv.base_prices;DATA.pm=kv.width_prices||{};DATA.mp=kv.meteorite_prices||[];
          DATA.mk=kv.mokume_prices||[];DATA.f=kv.formula_constants||{};
          if(kv.misc_costs)DATA.misc_costs=kv.misc_costs;DATA.material_groups=kv.material_groups;
          return true;
        }
      }
    }catch(e){}
    const host=document.getElementById('v2-error-host');
    if(host && !document.getElementById('v2-pricing-error')){
      const b=document.createElement('div'); b.id='v2-pricing-error';
      b.innerHTML='<strong>⚠️ Pricing temporarily unavailable.</strong> Please refresh or try again shortly.<button onclick="window.location.reload()">Retry</button>';
      host.appendChild(b);
    }
    return false;
  }

  function renderAll(){ V2_STEPS.forEach(function(st){ rerenderSection(st.id); }); }

  // --- Close the band: push base-metal remainder + consolidate (replicates engine goToStep leave-compose) ---
  function closeBand(){
    if(!state.strips || !state.strips.length) return;
    if(!state.baseMetal) return;
    var used=state.strips.reduce(function(a,st){return a+st.width;},0);
    var remaining=state.ringWidth-used;
    if(remaining>0.01){
      if(window.pushUndo) try{pushUndo();}catch(e){}
      state.strips.push({material:state.baseMetal,width:parseFloat(remaining.toFixed(2))});
      if(window.consolidateStrips) try{consolidateStrips();}catch(e){}
    }
  }

  // --- Clamp the Add/Edit strip modal width input to its Available max, and ensure it never exceeds ---
  function clampModalWidth(){
    var modal=document.getElementById('addStripModalInner'); if(!modal) return;
    var inp=modal.querySelector('input[type="number"]'); if(!inp) return;
    var max=parseFloat(inp.getAttribute('max'));
    if(isNaN(max)) return;
    // snap current value down to max (rounded to 0.25 step, engine uses 0.25 increments)
    var v=parseFloat(inp.value);
    if(isNaN(v) || v>max){
      var snapped=Math.floor(max/0.25)*0.25;
      if(snapped<0.25) snapped=parseFloat(Math.max(0.25,max).toFixed(2));
      inp.value=String(snapped);
      inp.dispatchEvent(new Event('input',{bubbles:true}));
      inp.dispatchEvent(new Event('change',{bubbles:true}));
    }
    // no usable room: read the 'Available: X.XXmm' label; if < 0.25, close + toast
    var availLbl=modal.querySelector('*');
    var availTxt=modal.textContent||'';
    var m=availTxt.match(/Available:\s*([0-9.]+)\s*mm/i);
    var avail=m?parseFloat(m[1]):max;
    if(!isNaN(avail) && avail<0.25-1e-9){
      var ov=document.getElementById('addStripModal'); if(ov) ov.classList.remove('open');
      if(window.showRuleToast) try{showRuleToast('No room left for another inlay. Increase the band width or remove a strip first.');}catch(e){}
      return;
    }
    // if engine left value at 0 but there IS room, set to min 0.25
    if(parseFloat(inp.value)<0.25 && avail>=0.25){ inp.value='0.25'; inp.dispatchEvent(new Event('input',{bubbles:true})); }
    // enforce on further typing
    if(!inp.__v2clamped){
      inp.__v2clamped=true;
      inp.addEventListener('input',function(){
        var mx=parseFloat(inp.getAttribute('max'));
        var cur=parseFloat(inp.value);
        if(!isNaN(mx)&&!isNaN(cur)&&cur>mx){ inp.value=String(mx); }
      });
    }
  }

  // --- Ensure a top-right X OUTSIDE the scrolling popup (idempotent) ---
  // Wrap the scrolling .modal in a non-scrolling .v2-modal-frame so the X stays put.
  function ensureX(overlayEl, innerSel){
    if(!overlayEl) return;
    var inner=innerSel?overlayEl.querySelector(innerSel):overlayEl;
    if(!inner) return;
    var frame=inner.closest('.v2-modal-frame');
    if(!frame){
      frame=document.createElement('div');
      frame.className='v2-modal-frame';
      inner.parentNode.insertBefore(frame, inner);
      frame.appendChild(inner);
    }
    if(frame.querySelector('.v2-modal-x')) return;
    var x=document.createElement('button');
    x.className='v2-modal-x'; x.type='button'; x.setAttribute('aria-label','Close'); x.textContent='×';
    x.onclick=function(){ overlayEl.classList.remove('open'); };
    frame.appendChild(x);
  }

  // Wrap the engine strip modals: clamp width + guarantee X after they render
  ['openAddStripModal','openEditStripModal'].forEach(function(fn){
    if(typeof window[fn]==='function' && !window[fn].__v2wrapped){
      var orig=window[fn];
      var wrapped=function(){
        var r=orig.apply(this,arguments);
        setTimeout(function(){ clampModalWidth(); ensureX(document.getElementById('addStripModal'),'#addStripModalInner'); }, 0);
        return r;
      };
      wrapped.__v2wrapped=true; window[fn]=wrapped;
    }
  });
  // Swatch lightbox: add X when it opens (observe class change)
  (function(){
    var lb=document.getElementById('swatchLightbox');
    if(lb){
      new MutationObserver(function(){ if(lb.classList.contains('open')) ensureX(lb,null); })
        .observe(lb,{attributes:true,attributeFilter:['class']});
    }
  })();

  // Section 3: remove the "Custom Inlays" Yes/No block (inlays are opt-in via Section 4)
  function stripInlayToggle(host){
    if(!host) return;
    var hs=host.querySelectorAll('h3');
    hs.forEach(function(hh){
      if(/custom inlays/i.test(hh.textContent||'')){
        // remove heading + description <p> + the Yes/No toggle row that follow it
        var sib=hh.nextElementSibling;
        while(sib){
          var after=sib.nextElementSibling;
          var isToggleRow=/add inlays|base metal only/i.test(sib.textContent||'');
          sib.remove();
          if(isToggleRow) break;   // stop after removing the toggle row
          sib=after;
        }
        hh.remove();
      }
    });
  }

  var ENGRAVING_FONTS=['Bodoni MT','Bradley','Broadway','Brush','Cambria','Comic','Cooper Black','Courier','Curlz','Didot','ECCENTRIC','French','Futura','Giddyup','Gulim','Harrington','Helvetica','Hobo','Monotype','Old English','Pristina','Satisfy','Stencil','Viner'];
  // CSS font stacks for the 24 engraving fonts. Where a face isn't installed on the
  // customer's device the fallback keeps the preview readable; this is only a visual
  // approximation of the laser-engraved font, not the production render.
  var ENG_FONT_STACK={
    'Bodoni MT':'"Bodoni MT","Bodoni 72",Didot,"Playfair Display",serif',
    'Bradley':'"Bradley Hand","Segoe Print","Brush Script MT",cursive',
    'Broadway':'Broadway,"Modern No. 20","Cooper Black",fantasy',
    'Brush':'"Brush Script MT","Segoe Script","Bradley Hand",cursive',
    'Cambria':'Cambria,Georgia,"Times New Roman",serif',
    'Comic':'"Comic Sans MS","Comic Neue","Chalkboard SE",cursive',
    'Cooper Black':'"Cooper Black","Cooper Std",Broadway,fantasy',
    'Courier':'"Courier New",Courier,"Lucida Console",monospace',
    'Curlz':'"Curlz MT","Comic Sans MS",cursive',
    'Didot':'Didot,"Bodoni MT","Playfair Display",Georgia,serif',
    'ECCENTRIC':'"Eccentric Std",Impact,"Arial Black",fantasy',
    'French':'"French Script MT","Segoe Script","Brush Script MT",cursive',
    'Futura':'Futura,"Century Gothic","Trebuchet MS",sans-serif',
    'Giddyup':'"Giddyup Std","Comic Sans MS",fantasy',
    'Gulim':'Gulim,"Malgun Gothic","MS Gothic",sans-serif',
    'Harrington':'Harrington,"Bradley Hand","Segoe Print",cursive',
    'Helvetica':'Helvetica,Arial,"Helvetica Neue",sans-serif',
    'Hobo':'"Hobo Std","Cooper Black",fantasy',
    'Monotype':'"Monotype Corsiva","Segoe Script","Brush Script MT",cursive',
    'Old English':'"Old English Text MT",UnifrakturMaguntia,"Blackletter686 BT",serif',
    'Pristina':'Pristina,"Segoe Script","Brush Script MT",cursive',
    'Satisfy':'Satisfy,"Segoe Script","Brush Script MT",cursive',
    'Stencil':'Stencil,"Stencil Std",Impact,fantasy',
    'Viner':'"Viner Hand ITC","Segoe Print","Comic Sans MS",cursive'
  };
  function engFontStack(fn){ return ENG_FONT_STACK[fn]||'var(--font-display)'; }
  function applyEngPreviewFont(font){
    var prev=document.querySelector('.summary-section .engraving-preview');
    if(prev){ prev.style.fontFamily=engFontStack(font); prev.style.fontStyle='normal'; }
  }
  function injectFontSelect(host){
    if(!host) return;
    // find the "See engraving ... examples, fonts & details" link paragraph to insert before it
    var link=null, all=host.querySelectorAll('*');
    for(var i=0;i<all.length;i++){ if(/See engraving/i.test(all[i].textContent||'') && all[i].querySelector && all[i].querySelector('a')){ link=all[i]; break; } }
    if(!state.engravingFont) state.engravingFont=ENGRAVING_FONTS[0];
    // always (re)apply the current font to the freshly-rendered preview
    applyEngPreviewFont(state.engravingFont);
    if(host.querySelector('#engFontSelect')) return;
    var wrap=document.createElement('div'); wrap.className='eng-font-wrap';
    var lbl=document.createElement('label'); lbl.className='eng-font-label'; lbl.textContent='Font Selection'; lbl.setAttribute('for','engFontSelect');
    var sel=document.createElement('select'); sel.id='engFontSelect'; sel.className='eng-font-select';
    ENGRAVING_FONTS.forEach(function(fn){ var o=document.createElement('option'); o.value=fn; o.textContent=fn; o.style.fontFamily=engFontStack(fn); if(fn===state.engravingFont)o.selected=true; sel.appendChild(o); });
    sel.style.fontFamily=engFontStack(state.engravingFont);
    sel.onchange=function(){ state.engravingFont=sel.value; sel.style.fontFamily=engFontStack(sel.value); applyEngPreviewFont(sel.value); };
    wrap.appendChild(lbl); wrap.appendChild(sel);
    if(link && link.parentNode) link.parentNode.insertBefore(wrap, link); else host.appendChild(wrap);
  }

  // Inject selected engraving font into the quote POST body (engine unchanged)
  function installQuoteFontHook(){
    if(window.fetch.__v2fontwrapped) return;
    var orig=window.fetch;
    var wrapped=function(url,opts){
      try{
        if(opts && opts.body && typeof opts.body==='string' && typeof url==='string' && url.indexOf('jbj-ring-quote')>=0){
          var b=JSON.parse(opts.body);
          b.font=state.engravingFont||'';
          opts=Object.assign({},opts,{body:JSON.stringify(b)});
        }
      }catch(e){}
      return orig.call(this,url,opts);
    };
    wrapped.__v2fontwrapped=true;
    window.fetch=wrapped;
  }

  window.__V2_ROUTER__={ openSection, toggleSection, render:function(){ renderAll(); refreshHeaders(); updatePriceBar(); }, V2_STEPS, updatePriceBar, applyDependencyRules, rerenderSection };

  document.addEventListener('DOMContentLoaded', async function(){
    const tb=document.getElementById('v2-theme-btn');
    if(tb) tb.onclick=function(){ if(window.toggleTheme) toggleTheme(); };
    // accordion header clicks
    document.querySelectorAll('.acc-head[data-sec]').forEach(function(h){
      h.onclick=function(){ toggleSection(h.getAttribute('data-sec')); };
    });
    if(window.fetchSpotPrices){ try{ await fetchSpotPrices(); }catch(e){} }
    await v2LoadPricing();
    installUpdateHook();
    installQuoteFontHook();
    renderAll();
    if(window.renderRing) try{ renderRing(); }catch(e){}
    openSection(null);
  });

})();
</script>
</body>
